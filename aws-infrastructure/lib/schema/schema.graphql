# --- common.graphql ---

type PageInfo {
  nextCursor: String
  hasNextPage: Boolean!
}

type Query {
  _empty: String
  dashboardOverview(input: DashboardOverviewInput!): DashboardOverview!
  superAdminOverview(input: SuperAdminOverviewInput): SuperAdminOverview!
  
  # Admissions
  listAdmissions(
    filter: AdmissionFilter
    limit: Int = 25
    cursor: String
  ): AdmissionsConnection!
  getAdmission(id: ID!): Admission
  
  # Users (Staff & Access)
  me: User!
  listUsers(limit: Int, nextToken: String, filter: UserFilter): UserConnection!
  getUser(id: ID!): User
  
  # Tenants
  listTenants(limit: Int, nextToken: String): TenantConnection!
  getTenant(id: ID!): Tenant
  
  _studentsEmpty: String
  _feesEmpty: String
  _templatesEmpty: String
  
  # Audit
  listPlatformAuditLogs(
    input: ListPlatformAuditLogsInput!
  ): PlatformAuditLogsConnection!
  getPlatformAuditLog(id: ID!): PlatformAuditLogDetail!
  
  # Admin
  platformStats: PlatformStats!
  
  # Settings
  listAcademicYears: [AcademicYear!]!
  listTemplates(type: String): [Template!]!
  
  # Students
  listStudents(filter: StudentFilter, limit: Int, nextToken: String): StudentConnection!
}

type Mutation {
  _empty: String
  updateAdmissionStatus(id: ID!, status: String!): Admission!
  
  # Users
  createUser(input: CreateUserInput!): User! # Legacy/Dev
  updateUser(input: UpdateUserInput!): User!
  deactivateUser(id: ID!): Boolean
  inviteStaff(input: InviteStaffInput!): InviteStaffPayload!
  
  # Tenants
  createTenant(input: CreateTenantInput!): Tenant!
  updateTenant(input: UpdateTenantInput!): Tenant!
  deactivateTenant(id: ID!): Boolean
  
  # Admissions
  createAdmission(input: CreateAdmissionInput!): Admission!
  updateAdmission(input: UpdateAdmissionInput!): Admission!
  submitAdmission(id: ID!): Admission!
  reviewAdmission(id: ID!, input: ReviewAdmissionInput!): Admission!
  withdrawAdmission(id: ID!): Admission!
  
  # Storage
  generateUploadUrl(contentType: String!, filename: String!): UploadUrlPayload!
  
  # Settings
  createAcademicYear(input: CreateAcademicYearInput!): AcademicYear!
  createTemplate(input: CreateTemplateInput!): Template!
  publishTemplateVersion(input: PublishTemplateVersionInput!): TemplateVersion!
  
  # Students
  convertApplicationToStudent(applicationId: ID!): Student!
  
  # Finance
  createFeeHead(input: CreateFeeHeadInput!): FeeHead!
  createFeeStructure(input: CreateFeeStructureInput!): FeeStructure!
}

# --- dashboard.graphql ---

enum DateRangePreset {
  TODAY
  LAST_7_DAYS
  LAST_30_DAYS
  CUSTOM
}

input DateRangeInput {
  preset: DateRangePreset!
  fromDate: String
  toDate: String
}

input DashboardOverviewInput {
  campusId: ID!
  range: DateRangeInput
  timezone: String = "Asia/Kolkata"
}

input SuperAdminOverviewInput {
  range: DateRangeInput
  timezone: String = "Asia/Kolkata"
}

type DashboardTotals {
  activeStudents: Int!
  staff: Int!
  admissionsToday: Int!
  admissionsMTD: Int!
  enquiriesToday: Int!
  applicationsToday: Int!
  approvalsPending: Int!
  attendanceToday: Float # Percentage
}

type StatusCount {
  status: String!
  count: Int!
}

type DateCountPoint {
  date: String!
  count: Int!
}

type DateAmountPoint {
  date: String!
  amount: Float!
}

type AdmissionsMetrics {
  byStatus: [StatusCount!]!
  dailySubmissions: [DateCountPoint!]!
  funnel: [StatusCount!]!
}

type StudentsMetrics {
  activeCount: Int!
}

type FeesMetrics {
  collectedDaily: [DateAmountPoint!]!
  collectedThisMonth: Float!
  collectedToday: Float!
  dueTotal: Float
  isReady: Boolean!
}

type RecentAdmission {
  id: ID!
  studentName: String
  status: String!
  createdAt: String!
}

type DashboardOverview {
  totals: DashboardTotals!
  admissions: AdmissionsMetrics!
  students: StudentsMetrics!
  fees: FeesMetrics
  recentAdmissions: [RecentAdmission!]!
  campusName: String
  campusType: String
  generatedAt: String!
}

type SuperAdminTotals {
  tenants: Int!
  users: Int!
  students: Int!
  staff: Int!
  admins: Int!
}

type SuperAdminOverview {
  totals: SuperAdminTotals!
}


# --- admissions.graphql ---

type Admission {
  id: ID!
  studentName: String!
  status: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AdmissionEdge {
  cursor: String!
  node: Admission!
}

type AdmissionsConnection {
  edges: [AdmissionEdge!]!
  pageInfo: PageInfo!
}

input AdmissionFilter {
  status: String
  search: String
}

input CreateAdmissionInput {
  studentName: String!
  phone: String!
}

input UpdateAdmissionInput {
  id: ID!
  studentName: String
  status: String
}

input ReviewAdmissionInput {
  decision: String!
  comments: String
}

# --- users.graphql ---

type User {
  id: ID!
  email: String!
  fullName: String
  permissions: [String!]!
  roles: [String!]!
  tenantId: String
  isPrimaryOwner: Boolean
  phone: String
  status: String
  joinedAt: AWSDateTime
}

type UserEdge {
  cursor: String!
  node: User!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
}

input UserFilter {
  search: String
  campusId: ID
}

input InviteStaffInput {
  email: String!
  fullName: String!
  roleIds: [ID!]!
  campusIds: [ID!]
  allCampuses: Boolean
}

type InviteStaffPayload {
  success: Boolean!
  membershipId: ID
}

input CreateUserInput {
  email: String!
  fullName: String!
  role: String
}

input UpdateUserInput {
  id: ID!
  fullName: String
  role: String
}

# --- tenants.graphql ---

type Tenant {
  id: ID!
  name: String!
  slug: String
  isActive: Boolean!
  createdAt: AWSDateTime!
}

type TenantConnection {
  items: [Tenant!]!
  nextToken: String
}

input CreateTenantInput {
  name: String!
  slug: String
  email: String! 
}

input UpdateTenantInput {
  id: ID!
  name: String
  isActive: Boolean
}

# --- admin.graphql ---

type PlatformStats {
  totalTenants: Int!
  activeTenants: Int!
}

# --- storage.graphql ---

type UploadUrlPayload {
  uploadUrl: String!
  key: String!
}

# --- auditLogs.graphql ---

enum PlatformAuditTargetType {
  TENANT
  CAMPUS
  PROFILE
  FEATURE
}

type PlatformAuditLogListItem {
  id: ID!
  at: String!
  actorId: ID!
  action: String!
  targetType: PlatformAuditTargetType!
  targetId: ID
  metaSummary: String
}

type PlatformAuditLogDetail {
  id: ID!
  at: String!
  actorId: ID!
  action: String!
  targetType: PlatformAuditTargetType!
  targetId: ID
  meta: AWSJSON
}

type PlatformAuditLogEdge {
  cursor: String!
  node: PlatformAuditLogListItem!
}

type PlatformAuditLogsConnection {
  edges: [PlatformAuditLogEdge!]!
  pageInfo: PageInfo!
}

input PlatformAuditLogsFilter {
  actorId: ID
  action: String
  targetType: PlatformAuditTargetType
  targetId: ID
  fromAt: String
  toAt: String
}

input ListPlatformAuditLogsInput {
  filter: PlatformAuditLogsFilter
  limit: Int! = 25
  cursor: String
}

# --- templates.graphql ---

type Template {
  id: ID!
  type: String!
  name: String!
}

type TemplateVersion {
  id: ID!
  version: Int!
  content: AWSJSON!
  isPublished: Boolean!
}

input CreateTemplateInput {
  type: String!
  name: String!
}

input PublishTemplateVersionInput {
  templateId: ID!
  content: AWSJSON!
}

# --- settings.graphql ---

type AcademicYear {
  id: ID!
  name: String!
  startDate: String!
  endDate: String!
  isActive: Boolean!
}

input CreateAcademicYearInput {
  name: String!
  startDate: String!
  endDate: String!
}

# --- students.graphql ---

type Student {
  id: ID!
  fullName: String!
  registrationNumber: String
  status: String!
  currentGrade: String
}

type StudentConnection {
  items: [Student!]!
  nextToken: String
}

input StudentFilter {
  search: String
}

# --- fees.graphql ---

type FeeHead {
  id: ID!
  name: String!
  type: String!
}

type FeeStructure {
  id: ID!
  name: String!
}

input CreateFeeHeadInput {
  name: String!
  type: String!
}

input CreateFeeStructureInput {
  name: String!
}

services:
  postgres:
    image: postgres:16
    container_name: vebgenix-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vebgenix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data

volumes:
  postgres-local-data:

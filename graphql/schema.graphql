type BulkAssignResult {
  updated: Int!
}

type StudentSectionAssignment {
  studentId: ID!
  sectionId: ID!
  sectionName: String!
}

type RandomAssignResult {
  updated: Int!
  assignments: [StudentSectionAssignment!]!
}

input TimetableSlotInput {
  subjectId: ID
  teacherProfileId: ID
  dayOfWeek: String!
  periodNumber: Int!
  startTime: String!
  endTime: String!
  room: String
  label: String
  isBreak: Boolean

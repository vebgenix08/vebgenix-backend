  # Admin cleanup / dedup
  runDeduplication(input: AWSJSON): AWSJSON
  mergeEnquiries(input: AWSJSON!): AWSJSON
  mergeStudents(input: AWSJSON!): AWSJSON
  bulkDeleteInactiveEnquiries(input: AWSJSON): AWSJSON

  # Invites
  acceptInvite(token: String!, password: String): AcceptInvitePayload!

  # Legacy portal
  enableStudentPortal(studentId: ID!, email: String!): PortalEnablementPayload!

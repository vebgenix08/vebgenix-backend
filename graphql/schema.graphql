# --- common.graphql ---

type PageInfo {
  nextCursor: String
  hasNextPage: Boolean!
}

type Query {
  _empty: String
  health: String @aws_api_key
  dashboardOverview(input: DashboardOverviewInput!): DashboardOverview!
  superAdminOverview(input: SuperAdminOverviewInput): SuperAdminOverview!
  
  # Admissions
  listAdmissions(
    filter: AdmissionFilter
    limit: Int = 25
    cursor: String
  ): AdmissionsConnection!
  getAdmission(id: ID!): Admission
  
  # Users (Staff & Access)
  me: User!
  listUsers(limit: Int, nextToken: String, filter: UserFilter): UserConnection!
  getUser(id: ID!): User
  
  # Tenants
  listTenants(limit: Int, nextToken: String): TenantConnection!
  getTenant(id: ID!): Tenant
  validateSubdomain(subdomain: String!): SubdomainValidation!
  listAvailableFeatures: [AvailableFeature!]!

  _studentsEmpty: String
  _feesEmpty: String
  _templatesEmpty: String
  
  # Audit
  listPlatformAuditLogs(
    input: ListPlatformAuditLogsInput!
  ): PlatformAuditLogsConnection!
  getPlatformAuditLog(id: ID!): PlatformAuditLogDetail!
  
  # Admin
  platformStats: PlatformStats!
  
  # Settings & Master Data
  listAcademicYears: [AcademicYear!]!
  listTemplates(type: String): [Template!]!
  
  listCampuses: [Campus!]!
  getCampus(id: ID!): Campus
  
  # Students
  listStudents(filter: StudentFilter, limit: Int, nextToken: String): StudentConnection!

  # Academics — Timetable & Workload
  getSectionTimetable(sectionId: ID!): SectionTimetable!
  getTeacherTimetable(profileId: ID!): TeacherTimetable!
  getTeacherWorkload(profileId: ID!): TeacherWorkload!

  # Attendance
  listSectionStudents(sectionId: ID!): [AttendanceStudentInfo!]!
  getClassAttendance(sectionId: ID!, date: AWSDate!): [AttendanceRecord!]!
  getStudentAttendance(studentId: ID!, from: AWSDate!, to: AWSDate!): [AttendanceRecord!]!
  getAttendanceSummary(sectionId: ID!, from: AWSDate!, to: AWSDate!): AttendanceSummary!

  # Academics — Classes, Sections, Subjects
  listClasses(programId: ID): [AcademicsClass!]!
  listSections(classId: ID!): [AcademicsSection!]!
  listAllSections(campusId: ID, programId: ID): [AcademicsSection!]!
  getSection(sectionId: ID!): AcademicsSection!
  listSubjects: [AcademicsSubject!]!

  # Academics — Section Operations
  listSectionCourses(sectionId: ID!): [SectionCourse!]!
  listSectionIncharges(sectionId: ID!): [SectionIncharge!]!

  # Staff — extended profiles & hierarchy
  listStaffProfiles(campusId: ID, staffCategory: String, staffType: String): [StaffProfile!]!
  listCandidateManagers(campusId: ID!, staffCategory: String): [StaffProfile!]!
  getStaffProfile(profileId: ID!): StaffProfile

  # Finance
  listFeeHeads: [FeeHead!]!
  listFeeStructures: [FeeStructure!]!
  listPrograms: [FinanceProgram!]!
}

type Mutation {
  _empty: String
  updateAdmissionStatus(id: ID!, status: String!): Admission!
  
  # Users
  createUser(input: CreateUserInput!): User! # Legacy/Dev
  updateUser(input: UpdateUserInput!): User!
  deactivateUser(id: ID!): Boolean
  inviteStaff(input: InviteStaffInput!): InviteStaffPayload!
  
  # Tenants
  createTenant(input: CreateTenantInput!): Tenant!
  updateTenant(input: UpdateTenantInput!): Tenant!
  deactivateTenant(id: ID!): Boolean
  provisionTenant(input: ProvisionTenantInput!): ProvisionTenantResult!
  requestTenantDeletion(tenantId: ID!): TenantDeletionOtpResult!
  confirmTenantDeletion(tenantId: ID!, otp: String!): Boolean!

  # Admissions
  createAdmission(input: CreateAdmissionInput!): Admission!
  updateAdmission(input: UpdateAdmissionInput!): Admission!
  submitAdmission(id: ID!): Admission!
  reviewAdmission(id: ID!, input: ReviewAdmissionInput!): Admission!
  withdrawAdmission(id: ID!): Admission!
  
  # Storage
  generateUploadUrl(contentType: String!, filename: String!): UploadUrlPayload!
  
  # Settings & Master Data
  createAcademicYear(input: CreateAcademicYearInput!): AcademicYear!
  createTemplate(input: CreateTemplateInput!): Template!
  publishTemplateVersion(input: PublishTemplateVersionInput!): TemplateVersion!
  
  createCampus(input: CreateCampusInput!): Campus!
  updateCampus(id: ID!, input: CreateCampusInput!): Campus!
  
  # Students
  convertApplicationToStudent(applicationId: ID!): Student!
  enableStudentPortal(studentId: ID!, email: String!): PortalEnablementPayload!
  enableGuardianPortal(input: EnableGuardianPortalInput!): PortalEnablementPayload!
  
  # Finance — Fee Heads
  createFeeHead(input: CreateFeeHeadInput!): FeeHead!
  updateFeeHead(id: ID!, input: CreateFeeHeadInput!): FeeHead!
  deleteFeeHead(id: ID!): Boolean!

  # Finance — Fee Structures
  createFeeStructure(input: CreateFeeStructureInput!): FeeStructure!
  deleteFeeStructure(id: ID!): Boolean!

  # Academics — Timetable & Class Assignment
  replaceSectionTimetable(sectionId: ID!, slots: [TimetableSlotInput!]!): SectionTimetable!
  bulkAssignStudentsToClass(studentIds: [ID!]!, classId: ID!, sectionId: ID!): BulkAssignResult!
  randomAssignStudentsToClass(classId: ID!, studentIds: [ID!]): RandomAssignResult!

  # Academics — Classes CRUD
  createClass(input: CreateClassInput!): AcademicsClass!
  updateClass(classId: ID!, input: UpdateClassInput!): AcademicsClass!
  deleteClass(classId: ID!): Boolean!

  # Academics — Sections CRUD
  createSection(classId: ID!, input: CreateSectionInput!): AcademicsSection!
  updateSection(classId: ID!, sectionId: ID!, input: UpdateSectionInput!): AcademicsSection!
  deleteSection(classId: ID!, sectionId: ID!): Boolean!

  # Academics — Subjects CRUD
  createSubject(input: CreateSubjectInput!): AcademicsSubject!
  updateSubject(subjectId: ID!, input: UpdateSubjectInput!): AcademicsSubject!
  deleteSubject(subjectId: ID!): Boolean!

  # Academics — Section Courses (Subject Allocations)
  assignSectionCourse(sectionId: ID!, input: AssignCourseInput!): SectionCourse!
  updateSectionCourse(sectionId: ID!, allocationId: ID!, input: UpdateCourseInput!): SectionCourse!
  removeSectionCourse(sectionId: ID!, allocationId: ID!): Boolean!

  # Academics — Section Incharges
  assignSectionIncharge(sectionId: ID!, input: AssignInchargeInput!): SectionIncharge!
  removeSectionIncharge(sectionId: ID!, inchargeId: ID!): Boolean!

  # Academics — Single student class assignment
  assignStudentToClass(studentId: ID!, classId: ID!, sectionId: ID!): Boolean!

  # Staff — extended onboarding & hierarchy
  createTeachingStaff(input: CreateTeachingStaffInput!): CreateStaffPayload!
  createNonTeachingStaff(input: CreateNonTeachingStaffInput!): CreateStaffPayload!
  updateStaffProfile(profileId: ID!, input: UpdateStaffProfileInput!): StaffProfile!
  assignReportingManager(input: AssignReportingManagerInput!): StaffReportingInfo!
  bulkReassignHierarchy(input: BulkReassignHierarchyInput!): Boolean!

  # Attendance
  markClassAttendance(input: BulkAttendanceInput!): [AttendanceRecord!]!

  # Invites
  acceptInvite(token: String!, password: String): AcceptInvitePayload!
}

type AcceptInvitePayload {
  success: Boolean!
  email: String
  isExistingUser: Boolean
}

# --- dashboard.graphql ---

enum DateRangePreset {
  TODAY
  LAST_7_DAYS
  LAST_30_DAYS
  CUSTOM
}

input DateRangeInput {
  preset: DateRangePreset!
  fromDate: String
  toDate: String
}

input DashboardOverviewInput {
  campusId: ID!
  range: DateRangeInput
  timezone: String = "Asia/Kolkata"
}

input SuperAdminOverviewInput {
  range: DateRangeInput
  timezone: String = "Asia/Kolkata"
}

type DashboardTotals {
  activeStudents: Int!
  staff: Int!
  admissionsToday: Int!
  admissionsMTD: Int!
  enquiriesToday: Int!
  applicationsToday: Int!
  approvalsPending: Int!
  attendanceToday: Float # Percentage
}

type StatusCount {
  status: String!
  count: Int!
}

type DateCountPoint {
  date: String!
  count: Int!
}

type DateAmountPoint {
  date: String!
  amount: Float!
}

type AdmissionsMetrics {
  byStatus: [StatusCount!]!
  dailySubmissions: [DateCountPoint!]!
  funnel: [StatusCount!]!
}

type StudentsMetrics {
  activeCount: Int!
}

type FeesMetrics {
  collectedDaily: [DateAmountPoint!]!
  collectedThisMonth: Float!
  collectedToday: Float!
  dueTotal: Float
  isReady: Boolean!
}

type RecentAdmission {
  id: ID!
  studentName: String
  status: String!
  createdAt: String!
}

type DashboardOverview {
  totals: DashboardTotals!
  admissions: AdmissionsMetrics!
  students: StudentsMetrics!
  fees: FeesMetrics
  recentAdmissions: [RecentAdmission!]!
  campusName: String
  campusType: String
  generatedAt: String!
}

type SuperAdminTotals {
  tenants: Int!
  users: Int!
  students: Int!
  staff: Int!
  admins: Int!
}

type SuperAdminOverview {
  totals: SuperAdminTotals!
}



# ─── Attendance ───────────────────────────────────────────────────────────────

enum AttendanceStatus {
  PRESENT
  ABSENT
  LATE
  EXCUSED
}

type AttendanceRecord {
  id: ID!
  studentId: ID!
  student: AttendanceStudentInfo!
  sectionId: ID!
  campusId: ID!
  date: AWSDate!
  status: AttendanceStatus!
  remarks: String
  markedBy: ID
}

type AttendanceStudentInfo {
  id: ID!
  fullName: String!
  admissionNumber: String
}

type AttendanceSummary {
  sectionId: ID!
  from: AWSDate!
  to: AWSDate!
  totalDays: Int!
  records: [StudentAttendanceSummary!]!
}

type StudentAttendanceSummary {
  studentId: ID!
  student: AttendanceStudentInfo!
  present: Int!
  absent: Int!
  late: Int!
  excused: Int!
  attendancePercentage: Float!
}

input BulkAttendanceInput {
  sectionId: ID!
  campusId: ID!
  date: AWSDate!
  records: [AttendanceRecordInput!]!
}

input AttendanceRecordInput {
  studentId: ID!
  status: AttendanceStatus!
  remarks: String
}

# ─── Query ────────────────────────────────────────────────────────────────────

type Query {
  _empty: String
  health: String @aws_api_key

  # Dashboard
  dashboardOverview(input: DashboardOverviewInput!): DashboardOverview!
  superAdminOverview(input: SuperAdminOverviewInput): SuperAdminOverview!
  platformStats: PlatformStats!

  # Identity
  me: User!
  listUsers(limit: Int, nextToken: String, filter: UserFilter): UserConnection!
  getUser(id: ID!): User
  listStaff(campusId: ID, limit: Int, nextToken: String): AWSJSON
  getStaffMember(id: ID!): AWSJSON
  listEmployees(campusId: ID, limit: Int, nextToken: String, filter: AWSJSON): AWSJSON
  getEmployee(id: ID!): AWSJSON
  listCampusAccess(userId: ID!): AWSJSON

  # Tenants (super-admin)
  listTenants(limit: Int, nextToken: String): TenantConnection!
  getTenant(id: ID!): Tenant
  validateSubdomain(subdomain: String!): SubdomainValidation!
  listAvailableFeatures: [AvailableFeature!]!
  listTenantUsers(tenantId: ID!): AWSJSON

  # Admissions — legacy
  listAdmissions(filter: AdmissionFilter, limit: Int, cursor: String): AdmissionsConnection!
  getAdmission(id: ID!): Admission

  # Enquiries & Applications
  listEnquiries(campusId: ID, filter: AWSJSON, limit: Int, nextToken: String): AWSJSON
  getEnquiry(id: ID!): AWSJSON
  listApplications(campusId: ID, filter: AWSJSON, limit: Int, nextToken: String): AWSJSON
  getApplication(id: ID!): AWSJSON
  getApprovalQueue(campusId: ID, limit: Int, nextToken: String): AWSJSON
  getApplicationReviews(applicationId: ID!): AWSJSON
  admissionsStats(campusId: ID, academicYearId: ID): AWSJSON

  # Finance
  listFeeHeads(isActive: Boolean): AWSJSON
  listFeeStructures(campusId: ID, academicYearId: ID): AWSJSON
  getFeeStructure(id: ID!): AWSJSON
  listFeeAssignments(studentId: ID, academicYearId: ID, limit: Int, nextToken: String): AWSJSON
  getFeeAssignment(id: ID!): AWSJSON
  getStudentFeeAssignment(studentId: ID!, academicYearId: ID): AWSJSON
  listFeeSchedules(academicYearId: ID): AWSJSON
  listInstallmentPlans(isActive: Boolean): AWSJSON
  listInvoices(studentId: ID, status: String, limit: Int, nextToken: String): AWSJSON
  getInvoice(id: ID!): AWSJSON
  getStudentInvoices(studentId: ID!): AWSJSON
  listPayments(invoiceId: ID, studentId: ID, limit: Int, nextToken: String): AWSJSON
  getPayment(id: ID!): AWSJSON
  getFeeRevisions(invoiceId: ID!): AWSJSON
  dayBookReport(date: String, campusId: ID): AWSJSON
  feeCollectionAnalytics(campusId: ID, from: String, to: String): AWSJSON
  classFeeStats(classId: ID!, academicYearId: ID): AWSJSON
  studentFinancialSummary(studentId: ID!): AWSJSON
  listReceipts(studentId: ID, from: String, to: String, limit: Int, nextToken: String): AWSJSON
  getReceipt(id: ID!): AWSJSON
  getFeeAssignmentQueue(campusId: ID, academicYearId: ID): AWSJSON
  getAssignableFeeStructures(studentId: ID!, academicYearId: ID): AWSJSON
  getStudentDues(studentId: ID!): AWSJSON

  # Academics — Classes, Sections, Subjects
  listClasses(campusId: ID, programId: ID): AWSJSON
  getClass(id: ID!): AWSJSON
  listAllSections(classId: ID, campusId: ID, academicYearId: ID): AWSJSON
  getSection(id: ID!): AWSJSON
  listSectionStudents(sectionId: ID!): [AttendanceStudentInfo!]!
  listSubjects(campusId: ID, isActive: Boolean): AWSJSON
  getSubject(id: ID!): AWSJSON
  listSectionCourses(sectionId: ID!): AWSJSON

  # Students
  listStudents(filter: StudentFilter, limit: Int, nextToken: String): StudentConnection!
  getStudent(id: ID!): AWSJSON

  # Attendance
  listAttendance(studentId: ID, sectionId: ID, from: String, to: String): AWSJSON
  getSectionAttendance(sectionId: ID!, date: AWSDate!): [AttendanceRecord!]!
  getSectionAttendanceSummary(sectionId: ID!, from: AWSDate!, to: AWSDate!): AttendanceSummary!
  getClassAttendance(sectionId: ID!, date: AWSDate!): [AttendanceRecord!]!
  getStudentAttendance(studentId: ID!, from: AWSDate!, to: AWSDate!): [AttendanceRecord!]!
  getAttendanceSummary(sectionId: ID!, from: AWSDate!, to: AWSDate!): AttendanceSummary!

  # Exams & Marks
  listExams(campusId: ID, academicYearId: ID, classId: ID): AWSJSON
  getExam(id: ID!): AWSJSON
  listResults(examId: ID!): AWSJSON
  getExamResults(examId: ID!): AWSJSON
  getExamStats(id: ID!): AWSJSON
  getMarksStatus(id: ID!): AWSJSON

  # Timetable
  getSectionTimetable(sectionId: ID!): SectionTimetable!
  getTeacherTimetable(profileId: ID!): TeacherTimetable!
  getTeacherWorkload(profileId: ID!): TeacherWorkload!

  # Certificates
  listCertificates(studentId: ID!): AWSJSON

  # Settings
  listAcademicYears: [AcademicYear!]!
  getAcademicYear(id: ID!): AcademicYear
  listCampuses: [Campus!]!
  getCampus(id: ID!): Campus
  listPrograms(campusId: ID): AWSJSON
  getProgram(id: ID!): AWSJSON
  listTemplates(type: String): [Template!]!
  getTemplate(id: ID!): AWSJSON
  getTenantFeatures: AWSJSON

  # Audit logs
  listAuditLogs(filter: AWSJSON, limit: Int, nextToken: String): AWSJSON
  listPlatformAuditLogs(input: ListPlatformAuditLogsInput!): PlatformAuditLogsConnection!
  getPlatformAuditLog(id: ID!): PlatformAuditLogDetail!

  # Comms
  listAnnouncements(campusId: ID, status: String, limit: Int, nextToken: String): AWSJSON
  getAnnouncement(id: ID!): AWSJSON
  listEvents(campusId: ID, from: String, to: String, limit: Int, nextToken: String): AWSJSON
  getEvent(id: ID!): AWSJSON
  listLeaveRequests(profileId: ID, status: String, limit: Int, nextToken: String): AWSJSON
  getLeaveRequest(id: ID!): AWSJSON

  # Results service
  listResultBatches(campusId: ID, academicYearId: ID, status: String): AWSJSON
  getResultBatch(id: ID!): AWSJSON
  getPublicResult(token: String!): AWSJSON
  getResultPublicToken(id: ID!): AWSJSON

  # Admin cleanup / dedup
  getDuplicateReport(campusId: ID): AWSJSON
  getDuplicateEnquiryReport(campusId: ID): AWSJSON
  getDuplicateStudentReport(campusId: ID): AWSJSON

  # Storage
  generateDownloadUrl(key: String!): AWSJSON

  # Legacy placeholders (kept for backward compat)
  _studentsEmpty: String
  _feesEmpty: String
  _templatesEmpty: String
}

# ─── Mutation ─────────────────────────────────────────────────────────────────

type Mutation {
  _empty: String

  # Identity
  createUser(input: CreateUserInput!): User!
  updateUser(input: UpdateUserInput!): User!
  deactivateUser(id: ID!): Boolean
  reactivateUser(id: ID!): Boolean
  inviteStaff(input: InviteStaffInput!): InviteStaffPayload!
  updateEmployee(id: ID!, input: AWSJSON!): AWSJSON
  addCampusAccess(userId: ID!, campusId: ID!): AWSJSON
  removeCampusAccess(userId: ID!, campusId: ID!): Boolean
  assignRole(userId: ID!, roleId: ID!): AWSJSON
  removeRole(userId: ID!, roleId: ID!): Boolean
  bulkDeactivateUsers(userIds: [ID!]!): AWSJSON
  impersonateUser(userId: ID!): AWSJSON
  updateMyProfile(input: AWSJSON!): AWSJSON
  uploadAvatar(input: AWSJSON!): AWSJSON
  uploadTenantLogo(input: AWSJSON!): AWSJSON
  resendInvite(staffId: ID!): Boolean

  # Tenants
  createTenant(input: CreateTenantInput!): Tenant!
  updateTenant(input: UpdateTenantInput!): Tenant!
  deactivateTenant(id: ID!): Boolean
  provisionTenant(input: ProvisionTenantInput!): ProvisionTenantResult!
  requestTenantDeletion(tenantId: ID!): TenantDeletionOtpResult!
  confirmTenantDeletion(tenantId: ID!, otp: String!): Boolean!
  createFirstAdmin(tenantId: ID!, input: AWSJSON!): AWSJSON
  finalizeOnboarding(tenantId: ID!, input: AWSJSON): AWSJSON
  finalizeTenant(tenantId: ID!, input: AWSJSON): AWSJSON
  resendTenantInvite(tenantId: ID!): Boolean
  provisionTenantUser(tenantId: ID!, input: AWSJSON!): AWSJSON
  deleteTenantUser(tenantId: ID!, userId: ID!): Boolean

  # Admissions — legacy
  createAdmission(input: CreateAdmissionInput!): Admission!
  updateAdmission(input: UpdateAdmissionInput!): Admission!
  submitAdmission(id: ID!): Admission!
  reviewAdmission(id: ID!, input: ReviewAdmissionInput!): Admission!
  withdrawAdmission(id: ID!): Admission!
  updateAdmissionStatus(id: ID!, status: String!): Admission!

  # Enquiries & Applications
  createPublicEnquiry(input: AWSJSON!): AWSJSON
  createEnquiry(input: AWSJSON!): AWSJSON
  updateEnquiry(id: ID!, input: AWSJSON!): AWSJSON
  deleteEnquiry(id: ID!): Boolean
  checkDuplicate(input: AWSJSON!): AWSJSON
  createApplication(input: AWSJSON!): AWSJSON
  submitApplication(id: ID!): AWSJSON
  reviewApplication(id: ID!, input: AWSJSON!): AWSJSON
  withdrawApplication(id: ID!): AWSJSON
  approveApplication(id: ID!, input: AWSJSON): AWSJSON
  rejectApplication(id: ID!, input: AWSJSON): AWSJSON
  verifyDocument(applicationId: ID!, documentId: ID!, input: AWSJSON!): AWSJSON
  getUploadUrl(input: AWSJSON!): AWSJSON

  # Finance
  createFeeHead(input: CreateFeeHeadInput!): FeeHead!
  updateFeeHead(id: ID!, input: AWSJSON!): AWSJSON
  deleteFeeHead(id: ID!): Boolean
  createFeeStructure(input: CreateFeeStructureInput!): FeeStructure!
  updateFeeStructure(id: ID!, input: AWSJSON!): AWSJSON
  deleteFeeStructure(id: ID!): Boolean
  createFeeAssignment(input: AWSJSON!): AWSJSON
  bulkAssignFeeStructure(input: AWSJSON!): AWSJSON
  createFeeSchedule(input: AWSJSON!): AWSJSON
  updateFeeSchedule(id: ID!, input: AWSJSON!): AWSJSON
  deleteFeeSchedule(id: ID!): Boolean
  createInstallmentPlan(input: AWSJSON!): AWSJSON
  updateInstallmentPlan(id: ID!, input: AWSJSON!): AWSJSON
  deleteInstallmentPlan(id: ID!): Boolean
  createInvoice(input: AWSJSON!): AWSJSON
  updateInvoice(id: ID!, input: AWSJSON!): AWSJSON
  cancelInvoice(id: ID!, reason: String): AWSJSON
  reviseInvoice(id: ID!, input: AWSJSON!): AWSJSON
  recordPayment(input: AWSJSON!): AWSJSON
  createPaymentOrder(invoiceId: ID!): AWSJSON
  verifyPaymentSignature(input: AWSJSON!): AWSJSON
  createOneOffCharge(input: AWSJSON!): AWSJSON
  bulkCreateCharge(input: AWSJSON!): AWSJSON
  collectPaymentByStudent(studentId: ID!, input: AWSJSON!): AWSJSON
  generatePaymentLink(invoiceId: ID!): AWSJSON
  addScheduleSlot(scheduleId: ID!, input: AWSJSON!): AWSJSON
  deleteScheduleSlot(scheduleId: ID!, slotIndex: Int!): Boolean

  # Academics — Classes & Sections
  createClass(input: AWSJSON!): AWSJSON
  updateClass(id: ID!, input: AWSJSON!): AWSJSON
  deleteClass(id: ID!): Boolean
  createSection(classId: ID!, input: AWSJSON!): AWSJSON
  updateSection(id: ID!, input: AWSJSON!): AWSJSON
  deleteSection(id: ID!): Boolean
  setSectionIncharge(sectionId: ID!, input: AWSJSON!): AWSJSON
  assignSectionCourse(sectionId: ID!, input: AWSJSON!): AWSJSON
  removeSectionCourse(sectionId: ID!, allocationId: ID!): Boolean
  createSubject(input: AWSJSON!): AWSJSON
  updateSubject(id: ID!, input: AWSJSON!): AWSJSON
  deleteSubject(id: ID!): Boolean

  # Students
  enrollStudent(input: AWSJSON!): AWSJSON
  updateStudent(id: ID!, input: AWSJSON!): AWSJSON
  updateStudentStatus(id: ID!, status: String!): AWSJSON
  assignStudentClass(studentId: ID!, input: AWSJSON!): AWSJSON
  bulkAssignStudentsToClass(studentIds: [ID!]!, classId: ID!, sectionId: ID!): BulkAssignResult!
  randomAssignStudentsToClass(classId: ID!, studentIds: [ID!]): RandomAssignResult!
  convertApplicationToStudent(applicationId: ID!): Student!
  enablePortalAccess(studentId: ID!, email: String!): PortalEnablementPayload!

  # Attendance
  markSectionAttendance(input: BulkAttendanceInput!): [AttendanceRecord!]!
  markClassAttendance(input: BulkAttendanceInput!): [AttendanceRecord!]!

  # Exams & Marks
  createExam(input: AWSJSON!): AWSJSON

}

type TimetableSlot {
  id: ID!
  sectionId: ID!
  subjectId: ID
  teacherProfileId: ID
  dayOfWeek: String!
  periodNumber: Int!
  startTime: String!
  endTime: String!
  room: String
  label: String
  isBreak: Boolean!
  subject: TimetableSubject
  teacher: TimetableTeacher
}

type TimetableSlotWithSection {
  id: ID!
  sectionId: ID!
  subjectId: ID
  teacherProfileId: ID
  dayOfWeek: String!
  periodNumber: Int!
  startTime: String!
  endTime: String!
  room: String
  label: String
  isBreak: Boolean!
  subject: TimetableSubject
  teacher: TimetableTeacher

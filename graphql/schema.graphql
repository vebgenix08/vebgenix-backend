  excused: Int!
  attendancePercentage: Float!
}

input BulkAttendanceInput {
  sectionId: ID!
  campusId: ID!
  date: AWSDate!
  records: [AttendanceRecordInput!]!
}

input AttendanceRecordInput {
  studentId: ID!

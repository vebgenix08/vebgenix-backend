  publishTemplateVersion(input: PublishTemplateVersionInput!): TemplateVersion!
  deleteTemplate(id: ID!): Boolean
  updateTenantFeatures(input: AWSJSON!): AWSJSON

  # Storage
  generateUploadUrl(contentType: String!, filename: String!): UploadUrlPayload!

  # Comms
  createAnnouncement(input: AWSJSON!): AWSJSON
  updateAnnouncement(id: ID!, input: AWSJSON!): AWSJSON
  publishAnnouncement(id: ID!): AWSJSON
  archiveAnnouncement(id: ID!): AWSJSON
  deleteAnnouncement(id: ID!): Boolean
  createEvent(input: AWSJSON!): AWSJSON
  updateEvent(id: ID!, input: AWSJSON!): AWSJSON
  deleteEvent(id: ID!): Boolean

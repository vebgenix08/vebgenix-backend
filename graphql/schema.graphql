# ─── Dashboard ────────────────────────────────────────────────────────────────

enum DateRangePreset {
  TODAY
  LAST_7_DAYS
  LAST_30_DAYS
  CUSTOM
}

input DateRangeInput {
  preset: DateRangePreset!
  fromDate: String
  toDate: String
}

input DashboardOverviewInput {
  campusId: ID!
  range: DateRangeInput
  timezone: String = "Asia/Kolkata"
}

input SuperAdminOverviewInput {
  range: DateRangeInput
  timezone: String = "Asia/Kolkata"
}

type DashboardTotals {
  activeStudents: Int!
  staff: Int!
  admissionsToday: Int!
  admissionsMTD: Int!
  enquiriesToday: Int!
  applicationsToday: Int!
  approvalsPending: Int!
  attendanceToday: Float
}

type StatusCount {
  status: String!
  count: Int!
}

type DateCountPoint {
  date: String!
  count: Int!
}

type DateAmountPoint {
  date: String!
  amount: Float!
}

type AdmissionsMetrics {
  byStatus: [StatusCount!]!
  dailySubmissions: [DateCountPoint!]!
  funnel: [StatusCount!]!
}

type StudentsMetrics {
  activeCount: Int!
}

type FeesMetrics {
  collectedDaily: [DateAmountPoint!]!
  collectedThisMonth: Float!
  collectedToday: Float!
  dueTotal: Float
  isReady: Boolean!
}

type RecentAdmission {
  id: ID!
  studentName: String
  status: String!
  createdAt: String!
}

type DashboardOverview {
  totals: DashboardTotals!
  admissions: AdmissionsMetrics!
  students: StudentsMetrics!
  fees: FeesMetrics
  recentAdmissions: [RecentAdmission!]!
  campusName: String
  campusType: String
  generatedAt: String!
}

type SuperAdminTotals {
  tenants: Int!
  users: Int!
  students: Int!
  staff: Int!
  admins: Int!
}

type SuperAdminOverview {
  totals: SuperAdminTotals!
}

type PlatformStats {
  totalTenants: Int!
  activeTenants: Int!
}

# ─── Audit Logs ───────────────────────────────────────────────────────────────

enum PlatformAuditTargetType {
  TENANT
  CAMPUS
  PROFILE
  FEATURE
}

type PlatformAuditLogListItem {
  id: ID!
  at: String!
  actorId: ID!
  action: String!
  targetType: PlatformAuditTargetType!
  targetId: ID
  metaSummary: String
}

type PlatformAuditLogDetail {
  id: ID!
  at: String!
  actorId: ID!
  action: String!
  targetType: PlatformAuditTargetType!
  targetId: ID
  meta: AWSJSON
}

type PlatformAuditLogEdge {
  cursor: String!
  node: PlatformAuditLogListItem!
}

type PlatformAuditLogsConnection {
  edges: [PlatformAuditLogEdge!]!
  pageInfo: PageInfo!
}

input PlatformAuditLogsFilter {
  actorId: ID
  action: String
  targetType: PlatformAuditTargetType
  targetId: ID
  fromAt: String
  toAt: String
}

input ListPlatformAuditLogsInput {
  filter: PlatformAuditLogsFilter
  limit: Int! = 25
  cursor: String
}

type AuditLogEntry {
  id:         ID!
  at:         String!
  actorId:    String!
  actorEmail: String
  action:     String!
  category:   String
  severity:   String!
  targetType: String!
  targetId:   String
  targetName: String
  meta:       AWSJSON
  ipAddress:  String
}

# ─── Timetable & Academics ────────────────────────────────────────────────────

type TimetableSubject {
  id: ID!
  name: String!
  code: String
  subjectType: String
}

type TimetableTeacher {
  id: ID!
  fullName: String
  email: String
  avatarUrl: String
}

type TimetableCampus {
  id: ID!
  name: String!
}

type TimetableClass {
  id: ID!
  name: String!
}

type TimetableSectionRef {
  id: ID!
  name: String!
  class: TimetableClass

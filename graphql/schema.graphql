  updateLeaveRequest(id: ID!, input: AWSJSON!): AWSJSON
  approveLeave(id: ID!, remarks: String): AWSJSON
  rejectLeave(id: ID!, remarks: String): AWSJSON
  cancelLeave(id: ID!): AWSJSON

# ─── Shared ──────────────────────────────────────────────────────────────────

type PageInfo {
  nextCursor: String
  hasNextPage: Boolean!
}

# ─── Identity ─────────────────────────────────────────────────────────────────

type User {
  id: ID!
  email: String!
  fullName: String
  firstName: String
  lastName: String
  permissions: [String!]!
  roles: [String!]!
  tenantId: String
  campusScope: String
  staffType: String
  isPrimaryOwner: Boolean
  isPlatformAdmin: Boolean
  phone: String
  status: String
  joinedAt: AWSDateTime
}

type UserEdge {
  cursor: String!
  node: User!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
}

input UserFilter {
  search: String
  campusId: ID
}

input InviteStaffInput {
  email: String!
  fullName: String!
  roleIds: [ID!]!
  campusIds: [ID!]
  allCampuses: Boolean
}

type InviteStaffPayload {
  success: Boolean!
  membershipId: ID
}

input CreateUserInput {
  email: String!
  fullName: String!
  role: String
}

input UpdateUserInput {
  id: ID!
  fullName: String
  role: String
}

# ─── Tenants ──────────────────────────────────────────────────────────────────

type Tenant {
  id:                 ID!
  name:               String!
  slug:               String
  fullDomain:         String
  isActive:           Boolean!
  onboardingComplete: Boolean!
  features:           [TenantFeatureItem!]!
  createdAt:          String!
}

type TenantFeatureItem {
  key:     String!
  enabled: Boolean!
}

type TenantConnection {
  items: [Tenant!]!
  nextToken: String
}

input CreateTenantInput {
  name: String!
  slug: String
  plan: String
}

input UpdateTenantInput {
  id:      ID!
  name:    String
  slug:    String
  logoUrl: String
}

type AvailableFeature {
  key:            String!
  name:           String!
  description:    String!
  defaultEnabled: Boolean!
}

type SubdomainValidation {
  available:   Boolean!
  normalized:  String!
  fullDomain:  String!
  suggestion:  String
}

input ProvisionTenantInput {
  organizationName: String!
  subdomain:        String!
  features:         [String!]!
  adminName:        String!
  adminEmail:       String!
}

type ProvisionTenantResult {
  tenant:     Tenant!
  adminEmail: String!
  inviteSent: Boolean!
}

type TenantDeletionOtpResult {
  sent:         Boolean!
  expiresIn:    Int!
  maskedEmail:  String!
}

type AcceptInvitePayload {
  success: Boolean!
  email: String
  isExistingUser: Boolean
}

# ─── Storage ──────────────────────────────────────────────────────────────────

type UploadUrlPayload {
  uploadUrl: String!
  key: String!
}

# ─── Settings ─────────────────────────────────────────────────────────────────

type AcademicYear {

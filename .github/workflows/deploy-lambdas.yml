name: Deploy Lambda Functions

# Single-function-per-resolver with dev/prod ALIASES.
#   vebgenix-tenants-resolver:dev  → dev code
#   vebgenix-tenants-resolver:prod → prod code
#
# Every deploy: publishes a new version, moves the alias.
# AppSync data sources point to the alias ARN — no ARN changes needed.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-lambdas-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      ENVIRONMENT:  ${{ github.event.inputs.environment }}
      AWS_REGION:   ap-south-1
      ALIAS:        ${{ github.event.inputs.environment }}   # alias name: 'dev' or 'prod'
      # CDK-created function names (cannot change without CDK redeploy):
      #   dev  → vebgenix-dev-{fn}    (prefix pattern)
      #   prod → vebgenix-{fn}
      # FN_PREFIX and LAYER_NAME are overridden per-environment in "Resolve environment variables"
      FN_PREFIX:    vebgenix

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Node
      # -----------------------------------------------------------------------
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # -----------------------------------------------------------------------
      # 3. AWS credentials via OIDC
      # -----------------------------------------------------------------------
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-prod
          aws-region: ap-south-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # -----------------------------------------------------------------------
      # 4. Resolve environment-specific variables
      #    prod: fixed AppSync API ID + Cognito pool
      #    dev:  lookup AppSync by name + dev Cognito pool
      # -----------------------------------------------------------------------
      - name: Resolve environment variables
        run: |
          set -euo pipefail

          if [ "$ENVIRONMENT" = "prod" ]; then
            echo "APPSYNC_API_ID=o6cgickkk5dpxej6lirgo7bpna"  >> $GITHUB_ENV
            echo "COGNITO_POOL_ID=ap-south-1_waAjEC9Nj"        >> $GITHUB_ENV
            # prod CDK naming: vebgenix-{fn}
            echo "FN_PREFIX=vebgenix"                          >> $GITHUB_ENV
            echo "LAYER_NAME=vebgenix-deps"                    >> $GITHUB_ENV
          else
            API_ID=$(aws appsync list-graphql-apis \
              --query "graphqlApis[?name=='vebgenix-dev'].apiId | [0]" \
              --output text 2>/dev/null || echo "")

            if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
              echo "ERROR: AppSync API 'vebgenix-dev' not found"
              aws appsync list-graphql-apis \
                --query "graphqlApis[].{id:apiId,name:name}" --output table
              exit 1
            fi

            echo "APPSYNC_API_ID=$API_ID"               >> $GITHUB_ENV
            echo "COGNITO_POOL_ID=ap-south-1_1pLVzImKk" >> $GITHUB_ENV
            # dev CDK naming: vebgenix-dev-{fn}
            echo "FN_PREFIX=vebgenix-dev"               >> $GITHUB_ENV
            echo "LAYER_NAME=vebgenix-dev-deps"         >> $GITHUB_ENV
          fi

      # -----------------------------------------------------------------------
      # 5. Build GraphQL schema
      # -----------------------------------------------------------------------
      - name: Build GraphQL schema
        run: node scripts/build-schema.mjs

      # -----------------------------------------------------------------------
      # 5b. Pre-flight: verify Lambda functions exist
      #     Lambda functions are created by the CDK infrastructure workflow
      #     (deploy-dev.yml / deploy-prod.yml).  If they are missing, this
      #     step fails with clear instructions so you don't get confusing
      #     "Function not found" errors later.
      # -----------------------------------------------------------------------
      - name: Pre-flight check (Lambda functions must exist)
        run: |
          set -euo pipefail

          FUNCTIONS=(
            "academics-resolver"
            "admin-resolver"
            "admissions-resolver"
            "audit-logs-resolver"
            "cognito-provisioner"
            "dashboard-resolver"
            "email-worker"
            "jobs-worker"
            "pre-token-generation"
            "storage-resolver"
            "tenants-resolver"
            "users-resolver"
          )

          MISSING=()
          for FN in "${FUNCTIONS[@]}"; do
            FULL_NAME="${FN_PREFIX}-${FN}"
            if ! aws lambda get-function --function-name "$FULL_NAME" \
                --query "Configuration.FunctionName" --output text \
                > /dev/null 2>&1; then
              MISSING+=("$FULL_NAME")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "  ERROR: The following Lambda functions do not exist yet:"
            echo ""
            for fn in "${MISSING[@]}"; do
              echo "    ✗ $fn"
            done
            echo ""
            echo "  Fix: run the Terraform workflow first:"
            echo "    GitHub → Actions → 'Terraform Infrastructure'"
            echo "    environment: $ENVIRONMENT  |  action: apply"
            echo ""
            echo "  That creates all Lambda functions, log groups, and AppSync"
            echo "  datasources via Terraform. Then re-run this workflow."
            echo "╚══════════════════════════════════════════════════════════╝"
            exit 1
          fi

          echo "Pre-flight check passed — all ${#FUNCTIONS[@]} functions exist ✓"

      # -----------------------------------------------------------------------
      # 6. Generate Prisma client (arm64 binary)
      # -----------------------------------------------------------------------
      - name: Install server deps and generate Prisma client
        working-directory: server
        run: |
          npm ci
          npx prisma generate --schema=prisma/schema.prisma

      # -----------------------------------------------------------------------
      # 7. Build Lambda Layer
      #    Structure: nodejs/node_modules/  (mounted at /opt/nodejs/node_modules/)
      #    Contents:  npm deps + Prisma arm64 client + lambda-shared utilities
      # -----------------------------------------------------------------------
      - name: Build Lambda Layer
        run: |
          set -euo pipefail

          LAYER_DIR=/tmp/layer/nodejs

          # Install Lambda npm deps
          mkdir -p "$LAYER_DIR"
          cp aws-infrastructure/lambda/package.json     "$LAYER_DIR/"
          cp aws-infrastructure/lambda/package-lock.json "$LAYER_DIR/"
          cd "$LAYER_DIR" && npm ci --omit=dev && cd -

          # Copy Prisma client + arm64 binary on top
          mkdir -p "$LAYER_DIR/node_modules/@prisma"
          cp -R server/node_modules/@prisma/client "$LAYER_DIR/node_modules/@prisma/"
          cp -R server/node_modules/.prisma        "$LAYER_DIR/node_modules/"

          # Verify arm64 binary
          if ls "$LAYER_DIR/node_modules/.prisma/client"/libquery_engine-linux-arm64* \
               1>/dev/null 2>&1; then
            echo "✓ arm64 binary present"
          else
            echo "ERROR: arm64 Prisma binary missing"; exit 1
          fi

          # Copy shared utilities as lambda-shared package
          mkdir -p "$LAYER_DIR/node_modules/lambda-shared"
          cp aws-infrastructure/lambda/shared/db.js         "$LAYER_DIR/node_modules/lambda-shared/"
          cp aws-infrastructure/lambda/shared/identity.js   "$LAYER_DIR/node_modules/lambda-shared/"
          cp aws-infrastructure/lambda/shared/withTenant.js "$LAYER_DIR/node_modules/lambda-shared/"
          cat > "$LAYER_DIR/node_modules/lambda-shared/package.json" \
            <<'EOF'
          {"name":"lambda-shared","version":"1.0.0","main":"db.js"}
          EOF

          # Zip with nodejs/ prefix
          cd /tmp/layer
          zip -r /tmp/layer.zip nodejs/ --exclude "*.git*"
          echo "Layer size: $(du -sh /tmp/layer.zip | cut -f1)"

      # -----------------------------------------------------------------------
      # 8. Package handler zip (no node_modules — those are in the layer)
      # -----------------------------------------------------------------------
      - name: Package Lambda handler zip
        run: |
          set -euo pipefail
          cd aws-infrastructure/lambda

          zip -r /tmp/lambda.zip . \
            --exclude "node_modules/*" \
            --exclude "shared/*" \
            --exclude "*.git*" \
            --exclude "**/test/**" \
            --exclude "**/__tests__/**" \
            --exclude "**/*.test.js" \
            --exclude "package.json" \
            --exclude "package-lock.json"

          echo "Handler zip size: $(du -sh /tmp/lambda.zip | cut -f1)"

      # -----------------------------------------------------------------------
      # 9. Publish Lambda Layer version
      # -----------------------------------------------------------------------
      - name: Publish Lambda Layer
        run: |
          set -euo pipefail

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name      "$LAYER_NAME" \
            --description     "node_modules + Prisma arm64 + lambda-shared ($ENVIRONMENT)" \
            --zip-file        fileb:///tmp/layer.zip \
            --compatible-runtimes    nodejs20.x \
            --compatible-architectures arm64 \
            --query "LayerVersionArn" --output text)

          echo "Published layer: $LAYER_ARN"
          echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 10. Deploy Lambda functions
      #
      #     For EVERY function:
      #       a) Update handler + attach new layer version
      #       b) Update code + PUBLISH a new numbered version
      #       c) Move the '$ALIAS' alias (dev|prod) to that version
      #
      #     AppSync data sources point to the alias ARN — the ARN never
      #     changes between deploys, so no AppSync data source update needed.
      # -----------------------------------------------------------------------
      - name: Deploy Lambda functions
        run: |
          set -euo pipefail

          FUNCTIONS=(
            "academics-resolver"
            "admin-resolver"
            "admissions-resolver"
            "audit-logs-resolver"
            "cognito-provisioner"
            "dashboard-resolver"
            "email-worker"
            "jobs-worker"
            "pre-token-generation"
            "storage-resolver"
            "tenants-resolver"
            "users-resolver"
          )

          for FN in "${FUNCTIONS[@]}"; do
            # dev: vebgenix-dev-{fn}   prod: vebgenix-{fn}
            FULL_NAME="${FN_PREFIX}-${FN}"
            echo ""
            echo "━━━ $FULL_NAME ━━━"

            # Check function exists before attempting update
            if ! aws lambda get-function --function-name "$FULL_NAME" \
                --query "Configuration.FunctionName" --output text > /dev/null 2>&1; then
              echo "  SKIP: $FULL_NAME not found in AWS"
              continue
            fi

            # a) Update handler + layer
            aws lambda update-function-configuration \
              --function-name "$FULL_NAME" \
              --handler       "${FN}/index.handler" \
              --layers        "$LAYER_ARN" \
              --query "{Handler:Handler}" --output json
            aws lambda wait function-updated --function-name "$FULL_NAME"

            # b) Update code + publish new version
            VERSION=$(aws lambda update-function-code \
              --function-name "$FULL_NAME" \
              --zip-file      fileb:///tmp/lambda.zip \
              --publish \
              --architectures arm64 \
              --query "Version" --output text)

            aws lambda wait function-updated --function-name "$FULL_NAME"
            echo "  Published version: $VERSION"

            # c) Move alias to new version (create alias if it doesn't exist yet)
            aws lambda update-alias \
              --function-name    "$FULL_NAME" \
              --name             "$ALIAS" \
              --function-version "$VERSION" \
              --query "AliasArn" --output text \
            2>/dev/null \
            || aws lambda create-alias \
              --function-name    "$FULL_NAME" \
              --name             "$ALIAS" \
              --function-version "$VERSION" \
              --query "AliasArn" --output text

            echo "  $FULL_NAME:$ALIAS → v$VERSION ✓"
          done

          echo ""
          echo "All Lambda functions deployed."

      # -----------------------------------------------------------------------
      # 11. Attach pre-token-generation trigger to Cognito
      #     Uses the alias ARN so Cognito always invokes the right version.
      # -----------------------------------------------------------------------
      - name: Attach pre-token-generation trigger to Cognito
        run: |
          set -euo pipefail

          FN_NAME="${FN_PREFIX}-pre-token-generation"

          # Get alias ARN (dev or prod)
          ALIAS_ARN=$(aws lambda get-alias \
            --function-name "$FN_NAME" \
            --name          "$ALIAS" \
            --query "AliasArn" --output text)

          echo "Attaching $ALIAS_ARN to Cognito pool $COGNITO_POOL_ID"

          # Fetch existing lambda config so we don't wipe other triggers
          EXISTING_CONFIG=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$COGNITO_POOL_ID" \
            --query "UserPool.LambdaConfig" --output json 2>/dev/null || echo "{}")

          # Merge: overwrite PreTokenGeneration (V1) AND PreTokenGenerationConfig (V2)
          # Both must point to the SAME ARN or Cognito throws InvalidParameterException.
          # jq is pre-installed on ubuntu-latest; avoids multiline python3 in YAML
          MERGED_CONFIG=$(echo "$EXISTING_CONFIG" \
            | jq --arg arn "$ALIAS_ARN" \
              '. + {"PreTokenGeneration": $arn, "PreTokenGenerationConfig": {"LambdaVersion": "V1_0", "LambdaArn": $arn}}')

          aws cognito-idp update-user-pool \
            --user-pool-id  "$COGNITO_POOL_ID" \
            --lambda-config "$MERGED_CONFIG"

          # Grant Cognito invoke permission on the alias (idempotent)
          aws lambda add-permission \
            --function-name "$FN_NAME:$ALIAS" \
            --statement-id  "CognitoInvoke-${COGNITO_POOL_ID}" \
            --action        "lambda:InvokeFunction" \
            --principal     "cognito-idp.amazonaws.com" \
            --source-arn    "arn:aws:cognito-idp:ap-south-1:278035644568:userpool/$COGNITO_POOL_ID" \
            2>/dev/null || echo "Permission already exists (ok)"

          echo "Pre-token trigger attached ✓"

      # -----------------------------------------------------------------------
      # 12. Push updated GraphQL schema to AppSync
      # -----------------------------------------------------------------------
      - name: Update AppSync schema
        run: |
          set -euo pipefail

          aws appsync start-schema-creation \
            --api-id    "$APPSYNC_API_ID" \
            --definition fileb://graphql/schema.graphql

          for i in $(seq 1 60); do
            STATUS=$(aws appsync get-schema-creation-status \
              --api-id "$APPSYNC_API_ID" --query "status" --output text)
            echo "  [$i] $STATUS"
            [ "$STATUS" = "SUCCESS" ] && break
            [ "$STATUS" = "FAILED"  ] && aws appsync get-schema-creation-status \
              --api-id "$APPSYNC_API_ID" && exit 1
            sleep 5
          done

          echo "Schema applied ✓"

      # -----------------------------------------------------------------------
      # 13. Sync AppSync resolvers (UNIT resolvers → Lambda data sources)
      #
      #     Data source names follow the CDK convention: <Name>Ds
      #     e.g. tenants-resolver → TenantsDs
      #
      #     The data source Lambda ARN is updated to the alias ARN on every
      #     deploy so dev/prod always invoke the correct Lambda version.
      #
      #     Add a new line to RESOLVER_MAP whenever you add a GraphQL field.
      # -----------------------------------------------------------------------
      - name: Sync AppSync resolvers
        run: |
          set -euo pipefail

          API_ID="$APPSYNC_API_ID"

          # "TypeName.fieldName=lambda-name" → data source = PascalCase(lambda-name) + Ds
          RESOLVER_MAP=(
            # ── Dashboard ──
            "Query.dashboardOverview=dashboard-resolver"
            "Query.superAdminOverview=dashboard-resolver"

            # ── Admissions ──
            "Query.listAdmissions=admissions-resolver"
            "Query.getAdmission=admissions-resolver"
            "Mutation.createAdmission=admissions-resolver"
            "Mutation.updateAdmission=admissions-resolver"
            "Mutation.updateAdmissionStatus=admissions-resolver"
            "Mutation.submitAdmission=admissions-resolver"
            "Mutation.reviewAdmission=admissions-resolver"
            "Mutation.withdrawAdmission=admissions-resolver"

            # ── Users ──
            "Query.me=users-resolver"
            "Query.listUsers=users-resolver"
            "Query.getUser=users-resolver"
            "Mutation.createUser=users-resolver"
            "Mutation.updateUser=users-resolver"
            "Mutation.deactivateUser=users-resolver"

            # ── Tenants ──
            "Query.listTenants=tenants-resolver"
            "Query.getTenant=tenants-resolver"
            "Query.validateSubdomain=tenants-resolver"
            "Query.listAvailableFeatures=tenants-resolver"
            "Mutation.createTenant=tenants-resolver"
            "Mutation.provisionTenant=tenants-resolver"
            "Mutation.updateTenant=tenants-resolver"
            "Mutation.deactivateTenant=tenants-resolver"
            "Mutation.requestTenantDeletion=tenants-resolver"
            "Mutation.confirmTenantDeletion=tenants-resolver"

            # ── Audit Logs ──
            "Query.listPlatformAuditLogs=audit-logs-resolver"
            "Query.getPlatformAuditLog=audit-logs-resolver"

            # ── Storage ──
            "Mutation.generateUploadUrl=storage-resolver"

            # ── Admin ──
            "Query.platformStats=admin-resolver"

            # ── Academics: Classes ──
            "Query.listClasses=academics-resolver"
            "Mutation.createClass=academics-resolver"
            "Mutation.updateClass=academics-resolver"
            "Mutation.deleteClass=academics-resolver"

            # ── Academics: Sections ──
            "Query.listSections=academics-resolver"
            "Query.listAllSections=academics-resolver"
            "Query.getSection=academics-resolver"
            "Mutation.createSection=academics-resolver"
            "Mutation.updateSection=academics-resolver"
            "Mutation.deleteSection=academics-resolver"

            # ── Academics: Subjects ──
            "Query.listSubjects=academics-resolver"
            "Mutation.createSubject=academics-resolver"
            "Mutation.updateSubject=academics-resolver"
            "Mutation.deleteSubject=academics-resolver"

            # ── Academics: Section Courses (allocations) ──
            "Query.listSectionCourses=academics-resolver"
            "Mutation.assignSectionCourse=academics-resolver"
            "Mutation.updateSectionCourse=academics-resolver"
            "Mutation.removeSectionCourse=academics-resolver"

            # ── Academics: Section Incharges ──
            "Query.listSectionIncharges=academics-resolver"
            "Mutation.assignSectionIncharge=academics-resolver"
            "Mutation.removeSectionIncharge=academics-resolver"

            # ── Academics: Student Assignment ──
            "Mutation.assignStudentToClass=academics-resolver"
            "Mutation.bulkAssignStudentsToClass=academics-resolver"
            "Mutation.randomAssignStudentsToClass=academics-resolver"

            # ── Academics: Timetable ──
            "Query.getSectionTimetable=academics-resolver"
            "Mutation.replaceSectionTimetable=academics-resolver"

            # ── Academics: Teacher ──
            "Query.getTeacherTimetable=academics-resolver"
            "Query.getTeacherWorkload=academics-resolver"
          )

          REQ='{"version":"2017-02-28","operation":"Invoke","payload":$util.toJson($ctx)}'
          RES='$util.toJson($ctx.result)'

          # Convert lambda-name to data source name (environment-aware):
          #   prod: admin-resolver  → AdminDs        (PascalCase + Ds, CDK-created)
          #   dev:  admin-resolver  → admin_resolver  (dashes → underscores)
          lambda_to_ds() {
            local name="$1"
            if [ "$ENVIRONMENT" = "prod" ]; then
              echo "$name" \
                | sed 's/-resolver//' \
                | awk -F'-' '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1))substr($i,2)}1' OFS='' \
                | sed 's/$/Ds/'
            else
              echo "$name" | tr '-' '_'
            fi
          }

          # Update each data source's Lambda ARN to use the current alias
          declare -A UPDATED_DS
          for entry in "${RESOLVER_MAP[@]}"; do
            LAMBDA_NAME="${entry##*=}"
            DS_NAME=$(lambda_to_ds "$LAMBDA_NAME")

            # Only update each data source once
            if [ -z "${UPDATED_DS[$DS_NAME]+_}" ]; then
              ALIAS_ARN=$(aws lambda get-alias \
                --function-name "${FN_PREFIX}-${LAMBDA_NAME}" \
                --name          "$ALIAS" \
                --query "AliasArn" --output text 2>/dev/null || echo "")

              if [ -n "$ALIAS_ARN" ] && [ "$ALIAS_ARN" != "None" ]; then
                # Get existing service role ARN so we can reuse it
                SVC_ROLE=$(aws appsync get-data-source \
                  --api-id "$API_ID" --name "$DS_NAME" \
                  --query "dataSource.serviceRoleArn" --output text 2>/dev/null || echo "")

                if [ -n "$SVC_ROLE" ] && [ "$SVC_ROLE" != "None" ]; then
                  aws appsync update-data-source \
                    --api-id          "$API_ID" \
                    --name            "$DS_NAME" \
                    --type            AWS_LAMBDA \
                    --lambda-config   "lambdaFunctionArn=$ALIAS_ARN" \
                    --service-role-arn "$SVC_ROLE" \
                    --query "dataSource.name" --output text > /dev/null \
                  && echo "  DS $DS_NAME → $ALIAS_ARN ✓" \
                  || echo "  WARN: failed to update $DS_NAME"
                else
                  echo "  SKIP $DS_NAME (data source not found — create it in AppSync console)"
                fi
                UPDATED_DS[$DS_NAME]=1
              else
                echo "  WARN: alias ${FN_PREFIX}-${LAMBDA_NAME}:$ALIAS not found"
              fi
            fi
          done

          echo ""
          echo "Syncing resolvers..."

          for entry in "${RESOLVER_MAP[@]}"; do
            TYPE_FIELD="${entry%%=*}"
            LAMBDA_NAME="${entry##*=}"
            TYPE_NAME="${TYPE_FIELD%%.*}"
            FIELD_NAME="${TYPE_FIELD##*.}"
            DS_NAME=$(lambda_to_ds "$LAMBDA_NAME")

            EXISTING=$(aws appsync get-resolver \
              --api-id    "$API_ID" \
              --type-name "$TYPE_NAME" \
              --field-name "$FIELD_NAME" \
              --query "resolver.resolverArn" --output text 2>/dev/null || echo "")

            if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
              aws appsync update-resolver \
                --api-id          "$API_ID" \
                --type-name       "$TYPE_NAME" \
                --field-name      "$FIELD_NAME" \
                --kind            UNIT \
                --data-source-name "$DS_NAME" \
                --request-mapping-template  "$REQ" \
                --response-mapping-template "$RES" \
                --query "resolver.fieldName" --output text > /dev/null
              echo "  ↺ $TYPE_NAME.$FIELD_NAME"
            else
              aws appsync create-resolver \
                --api-id          "$API_ID" \
                --type-name       "$TYPE_NAME" \
                --field-name      "$FIELD_NAME" \
                --kind            UNIT \
                --data-source-name "$DS_NAME" \
                --request-mapping-template  "$REQ" \
                --response-mapping-template "$RES" \
                --query "resolver.fieldName" --output text > /dev/null
              echo "  ✚ $TYPE_NAME.$FIELD_NAME"
            fi
          done

          echo ""
          echo "Resolvers synced ✓"

      # -----------------------------------------------------------------------
      # 14. Smoke test
      # -----------------------------------------------------------------------
      - name: Smoke test
        run: |
          set -euo pipefail

          APPSYNC_URL=$(aws appsync get-graphql-api \
            --api-id "$APPSYNC_API_ID" \
            --query  "graphqlApi.uris.GRAPHQL" --output text)

          API_KEY=$(aws appsync list-api-keys \
            --api-id "$APPSYNC_API_ID" \
            --query  "apiKeys[0].id" --output text 2>/dev/null || echo "")

          if [ -z "$API_KEY" ] || [ "$API_KEY" = "None" ]; then
            echo "No API key — skipping smoke test"
          else
            RESPONSE=$(curl -sf --max-time 30 \
              -X POST "$APPSYNC_URL" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $API_KEY" \
              -d '{"query":"{ health }"}')

            echo "Response: $RESPONSE"
            echo "$RESPONSE" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          if 'errors' in d: print('Errors:', d['errors']); sys.exit(1)
          print('health =', d.get('data',{}).get('health'))
          " && echo "Smoke test passed ✓" || echo "WARNING: smoke test errors (check logs)"
          fi

      # -----------------------------------------------------------------------
      # 15. Summary
      # -----------------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "  Deploy: $ENVIRONMENT  |  Alias: $ALIAS"
          echo "  AppSync: $APPSYNC_API_ID"
          echo "  Cognito: $COGNITO_POOL_ID"
          echo ""
          echo "  Pattern: ${FN_PREFIX}-{fn}:$ALIAS → published version"
          echo ""
          echo "  Functions deployed:"
          echo "    academics-resolver   admin-resolver"
          echo "    admissions-resolver  audit-logs-resolver"
          echo "    cognito-provisioner  dashboard-resolver"
          echo "    email-worker         jobs-worker"

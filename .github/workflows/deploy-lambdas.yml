name: Deploy Lambda Functions

# Direct Lambda deploy — no CDK. Packages aws-infrastructure/lambda/ and
# pushes to all Terraform-managed Lambda functions for the chosen environment.
# Much faster than CDK (~3 min vs ~15 min).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

# Only one deploy per environment at a time
concurrency:
  group: deploy-lambdas-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      AWS_REGION: ap-south-1

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Node (needed for Prisma generate + schema build)
      # -----------------------------------------------------------------------
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # -----------------------------------------------------------------------
      # 3. AWS credentials via OIDC
      # -----------------------------------------------------------------------
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-prod
          aws-region: ap-south-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # -----------------------------------------------------------------------
      # 4. Build merged GraphQL schema (schema.graphql → graphql/schema.graphql)
      # -----------------------------------------------------------------------
      - name: Build GraphQL schema
        run: node scripts/build-schema.mjs

      # -----------------------------------------------------------------------
      # 5. Generate Prisma client with Lambda binary targets
      #    schema.prisma has:
      #      binaryTargets = ["native", "rhel-openssl-3.0.x", "linux-arm64-openssl-3.0.x"]
      #    linux-arm64-openssl-3.0.x = Lambda arm64 (AL2023)
      # -----------------------------------------------------------------------
      - name: Install server deps and generate Prisma client
        working-directory: server
        run: |
          npm ci
          npx prisma generate --schema=prisma/schema.prisma

      # -----------------------------------------------------------------------
      # 6. Build the Lambda Layer (nodejs/node_modules)
      #    Layer structure Lambda expects:  nodejs/node_modules/...
      #    Mounted at runtime under:        /opt/nodejs/node_modules/
      #
      #    Steps:
      #      a) npm ci  — install lambda deps (aws-jwt-verify, etc.)
      #      b) copy Prisma client + arm64 binary on top
      #      c) verify arm64 binary present
      #      d) zip into layer.zip with the nodejs/ prefix
      # -----------------------------------------------------------------------
      - name: Build Lambda Layer
        run: |
          set -euo pipefail

          LAYER_DIR=/tmp/layer/nodejs

          # a) Install lambda npm deps into the layer staging dir
          mkdir -p "$LAYER_DIR"
          cp aws-infrastructure/lambda/package.json "$LAYER_DIR/"
          cp aws-infrastructure/lambda/package-lock.json "$LAYER_DIR/"
          cd "$LAYER_DIR"
          npm ci --omit=dev
          cd -

          # b) Copy generated Prisma client (with arm64 binary) on top
          mkdir -p "$LAYER_DIR/node_modules/@prisma"
          cp -R server/node_modules/@prisma/client \
              "$LAYER_DIR/node_modules/@prisma/"
          cp -R server/node_modules/.prisma \
              "$LAYER_DIR/node_modules/"

          # c) Verify arm64 binary is present
          BINARY_PATH="$LAYER_DIR/node_modules/.prisma/client"
          if ls "$BINARY_PATH"/libquery_engine-linux-arm64* 1>/dev/null 2>&1; then
            echo "✓ arm64 Prisma binary confirmed:"
            ls -lh "$BINARY_PATH"/libquery_engine-linux-arm64*
          else
            echo "ERROR: arm64 Prisma binary NOT found in $BINARY_PATH"
            ls -la "$BINARY_PATH"/ || true
            exit 1
          fi

          # d) Zip with the nodejs/ prefix (Lambda layer requirement)
          cd /tmp/layer
          zip -r /tmp/layer.zip nodejs/ \
            --exclude "*.git*"

          echo "Layer size: $(du -sh /tmp/layer.zip | cut -f1)"
          ls -lh /tmp/layer.zip

      # -----------------------------------------------------------------------
      # 7. Package handler code only (no node_modules — they live in the layer)
      # -----------------------------------------------------------------------
      - name: Package Lambda handler zip
        run: |
          set -euo pipefail
          cd aws-infrastructure/lambda

          zip -r /tmp/lambda.zip . \
            --exclude "node_modules/*" \
            --exclude "*.git*" \
            --exclude "**/test/**" \
            --exclude "**/__tests__/**" \
            --exclude "**/*.test.js" \
            --exclude "package.json" \
            --exclude "package-lock.json"

          echo "Handler zip size: $(du -sh /tmp/lambda.zip | cut -f1)"
          ls -lh /tmp/lambda.zip

      # -----------------------------------------------------------------------
      # 8. Resolve environment-specific variables
      #    prod: prefix=vebgenix,     layer=vebgenix-deps,     AppSync = o6cgickkk5dpxej6lirgo7bpna
      #    dev:  prefix=vebgenix-dev, layer=vebgenix-dev-deps, AppSync = dynamic lookup
      # -----------------------------------------------------------------------
      - name: Resolve deployment variables
        run: |
          set -euo pipefail

          if [ "$ENVIRONMENT" = "prod" ]; then
            echo "FN_PREFIX=vebgenix"                        >> $GITHUB_ENV
            echo "LAYER_NAME=vebgenix-deps"                  >> $GITHUB_ENV
            echo "APPSYNC_API_ID=o6cgickkk5dpxej6lirgo7bpna" >> $GITHUB_ENV
            echo "UPDATE_ALIAS=true"                         >> $GITHUB_ENV
          else
            echo "FN_PREFIX=vebgenix-dev"                    >> $GITHUB_ENV
            echo "LAYER_NAME=vebgenix-dev-deps"              >> $GITHUB_ENV
            echo "UPDATE_ALIAS=false"                        >> $GITHUB_ENV

            # Lookup AppSync API ID by name
            API_ID=$(aws appsync list-graphql-apis \
              --query "graphqlApis[?name=='vebgenix-dev'].apiId | [0]" \
              --output text 2>/dev/null || echo "")

            if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
              echo "ERROR: Could not find AppSync API named 'vebgenix-dev'"
              aws appsync list-graphql-apis --query "graphqlApis[].{id:apiId,name:name}" --output table
              exit 1
            fi

            echo "Found AppSync API: $API_ID"
            echo "APPSYNC_API_ID=$API_ID" >> $GITHUB_ENV
          fi

      # -----------------------------------------------------------------------
      # 9. Publish Lambda Layer and capture the new Layer Version ARN
      # -----------------------------------------------------------------------
      - name: Publish Lambda Layer
        run: |
          set -euo pipefail

          echo "Publishing layer: $LAYER_NAME"

          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "$LAYER_NAME" \
            --description "node_modules + Prisma arm64 binary ($ENVIRONMENT)" \
            --zip-file fileb:///tmp/layer.zip \
            --compatible-runtimes nodejs20.x \
            --compatible-architectures arm64 \
            --query "LayerVersionArn" \
            --output text)

          echo "Published layer ARN: $LAYER_ARN"
          echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 10. Deploy to all implemented Lambda functions
      #
      #     For each function:
      #       a) Fix handler path  (e.g. dashboard-resolver/index.handler)
      #       b) Attach the new layer version (replaces any previous layer)
      #       c) Update function code (handler zip — no node_modules)
      #       d) prod only: publish version + move alias
      #
      #     Implemented (10):
      #       admin-resolver, admissions-resolver, audit-logs-resolver,
      #       cognito-provisioner, dashboard-resolver, email-worker,
      #       jobs-worker, storage-resolver, tenants-resolver, users-resolver
      #
      #     Not yet implemented (skip):
      #       finance-resolver, settings-resolver, students-resolver
      # -----------------------------------------------------------------------
      - name: Update Lambda function code
        run: |
          set -euo pipefail

          FUNCTIONS=(
            "admin-resolver"
            "admissions-resolver"
            "audit-logs-resolver"
            "cognito-provisioner"
            "dashboard-resolver"
            "email-worker"
            "jobs-worker"
            "storage-resolver"
            "tenants-resolver"
            "users-resolver"
          )

          for FN in "${FUNCTIONS[@]}"; do
            FULL_NAME="${FN_PREFIX}-${FN}"
            HANDLER="${FN}/index.handler"
            echo ""
            echo "━━━ Deploying: $FULL_NAME (handler: $HANDLER) ━━━"

            # a) Fix handler + attach layer in one update-function-configuration call
            CURRENT_HANDLER=$(aws lambda get-function-configuration \
              --function-name "$FULL_NAME" \
              --query "Handler" --output text 2>/dev/null || echo "")

            echo "  Attaching layer: $LAYER_ARN"
            aws lambda update-function-configuration \
              --function-name "$FULL_NAME" \
              --handler "$HANDLER" \
              --layers "$LAYER_ARN" \
              --query "{Handler:Handler,Layers:Layers}" \
              --output json
            aws lambda wait function-updated --function-name "$FULL_NAME"
            echo "  Handler + layer updated ✓"

            # b) Push the handler zip (code only, no node_modules)
            if [ "$UPDATE_ALIAS" = "true" ]; then
              # prod: publish a new numbered version, then point the 'prod' alias at it
              OUTPUT=$(aws lambda update-function-code \
                --function-name "$FULL_NAME" \
                --zip-file fileb:///tmp/lambda.zip \
                --publish \
                --architectures arm64 \
                --output json)

              VERSION=$(echo "$OUTPUT" | python3 -c "import json,sys; print(json.load(sys.stdin)['Version'])")
              echo "  Published version: $VERSION"

              aws lambda wait function-updated --function-name "$FULL_NAME"

              # Move the 'prod' alias to the freshly published version
              aws lambda update-alias \
                --function-name "$FULL_NAME" \
                --name prod \
                --function-version "$VERSION" \
                --query "AliasArn" \
                --output text

              echo "  prod alias → version $VERSION ✓"

            else
              # dev: update code only (the 'dev' alias already points to $LATEST)
              aws lambda update-function-code \
                --function-name "$FULL_NAME" \
                --zip-file fileb:///tmp/lambda.zip \
                --architectures arm64 \
                --query "FunctionArn" \
                --output text

              aws lambda wait function-updated --function-name "$FULL_NAME"
              echo "  Updated (\$LATEST / dev alias) ✓"
            fi
          done

          echo ""
          echo "All Lambda functions deployed successfully."

      # -----------------------------------------------------------------------
      # 11. Push updated schema to AppSync
      # -----------------------------------------------------------------------
      - name: Update AppSync schema
        run: |
          set -euo pipefail

          echo "Applying schema to AppSync API: $APPSYNC_API_ID"
          echo "Schema checksum: $(sha256sum graphql/schema.graphql)"

          aws appsync start-schema-creation \
            --api-id "$APPSYNC_API_ID" \
            --definition fileb://graphql/schema.graphql

          for i in $(seq 1 60); do
            STATUS=$(aws appsync get-schema-creation-status \
              --api-id "$APPSYNC_API_ID" \
              --query "status" --output text)
            echo "  [$i/60] $STATUS"
            [ "$STATUS" = "SUCCESS" ] && break
            if [ "$STATUS" = "FAILED" ]; then
              aws appsync get-schema-creation-status --api-id "$APPSYNC_API_ID"
              exit 1
            fi
            sleep 5
          done

          [ "$STATUS" = "SUCCESS" ] || { echo "ERROR: Schema creation timed out"; exit 1; }
          echo "Schema applied successfully ✓"

      # -----------------------------------------------------------------------
      # 12. Smoke test — invoke health query via AppSync API key
      # -----------------------------------------------------------------------
      - name: Smoke test (AppSync health query)
        run: |
          set -euo pipefail

          # Get the GraphQL endpoint
          APPSYNC_URL=$(aws appsync get-graphql-api \
            --api-id "$APPSYNC_API_ID" \
            --query "graphqlApi.uris.GRAPHQL" \
            --output text)
          echo "AppSync endpoint: $APPSYNC_URL"

          # Get the API key (used only for health check — resolvers use Cognito auth)
          API_KEY=$(aws appsync list-api-keys \
            --api-id "$APPSYNC_API_ID" \
            --query "apiKeys[0].id" \
            --output text 2>/dev/null || echo "")

          if [ -z "$API_KEY" ] || [ "$API_KEY" = "None" ]; then
            echo "No API key found — skipping HTTP smoke test (check AppSync console manually)"
          else
            echo "Sending health query..."
            RESPONSE=$(curl -sf --max-time 30 \
              -X POST "$APPSYNC_URL" \
              -H "Content-Type: application/json" \
              -H "x-api-key: $API_KEY" \
              -d '{"query":"{ health }"}')
            echo "Response: $RESPONSE"

            # Fail if response contains GraphQL errors from Lambda crash
            if echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if 'errors' in d:
              print('GraphQL errors:', json.dumps(d['errors'], indent=2))
              sys.exit(1)
          print('health =', d.get('data', {}).get('health'))
          "; then
              echo "Smoke test passed ✓"
            else
              echo "WARNING: Smoke test returned errors (see above). Check Lambda logs."
              # Don't fail the deploy — health resolver uses NONE data source and should work
            fi
          fi

      # -----------------------------------------------------------------------
      # 13. Summary
      # -----------------------------------------------------------------------
      - name: Deployment summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "  Deploy complete: $ENVIRONMENT environment"
          echo "  AppSync API ID: $APPSYNC_API_ID"
          echo ""
          echo "  Deployed functions:"
          echo "    ✓ admin-resolver"
          echo "    ✓ admissions-resolver"
          echo "    ✓ audit-logs-resolver"
          echo "    ✓ cognito-provisioner"
          echo "    ✓ dashboard-resolver"
          echo "    ✓ email-worker"
          echo "    ✓ jobs-worker"
          echo "    ✓ storage-resolver"
          echo "    ✓ tenants-resolver"
          echo "    ✓ users-resolver"
          echo ""
          echo "  Skipped (not yet implemented):"
          echo "    - finance-resolver"
          echo "    - settings-resolver"
          echo "    - students-resolver"
          echo "╚══════════════════════════════════════════╝"

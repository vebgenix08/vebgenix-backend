name: Redeploy Lambda Functions

# Use this when you want to update Lambda code WITHOUT a full CDK stack deploy.
# CDK bundles and deploys Lambdas automatically on cdk deploy — this workflow
# provides a lightweight alternative that only updates Lambda function code.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]
      function:
        description: 'Lambda function name (e.g. "identity-service"). Leave empty to redeploy all.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-lambdas-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
      AWS_REGION: ap-south-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-${{ github.event.inputs.environment }}
          aws-region: ap-south-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install root monorepo dependencies
        run: npm ci

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      - name: Deploy AppSync stack (Lambdas + resolvers)
        # CDK with esbuild bundles and deploys all Lambda functions automatically.
        # The AppSync stack contains all Lambda functions and resolvers.
        working-directory: aws-infrastructure
        run: |
          STACK="VebgenixAppSync-${ENVIRONMENT}"
          echo "Deploying $STACK ..."
          npx cdk deploy "$STACK" -c env="$ENVIRONMENT" --require-approval never --exclusively
        env:
          FORCE_COLOR: '0'

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "Lambda functions in VebgenixAppSync-${ENVIRONMENT}:"
          aws lambda list-functions \
            --query "Functions[?starts_with(FunctionName, 'vebgenix-') && contains(FunctionName, '-${ENVIRONMENT}')].{Name:FunctionName,Runtime:Runtime,Updated:LastModified}" \
            --output table 2>/dev/null | grep -v "^$" || true

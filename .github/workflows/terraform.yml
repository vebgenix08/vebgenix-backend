name: CDK Infrastructure (OIDC stacks)

# This workflow deploys OIDC + IAM-only stacks that don't change often.
# For full infrastructure deployment, use deploy-dev.yml or deploy-prod.yml.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (dev or prod)'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

concurrency:
  group: cdk-oidc-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy-oidc:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-prod
          aws-region: ap-south-1

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      - name: Deploy OIDC stack
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixOidc-${{ github.event.inputs.environment }} -c env=${{ github.event.inputs.environment }} --require-approval never

      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name VebgenixOidc-${{ github.event.inputs.environment }} \
            --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
            --output table

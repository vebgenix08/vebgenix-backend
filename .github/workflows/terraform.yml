name: Terraform Infrastructure

on:
  push:
    branches:
      - main         # triggers dev infra update
      - release      # triggers prod infra update
    paths:
      - 'infrastructure/terraform/**'
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev or prod)'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Determine which environment to deploy based on branch/input
  # ─────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tf_action:   ${{ steps.env.outputs.tf_action }}
    steps:
      - name: Determine environment and action
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "tf_action=${{ github.event.inputs.action }}"        >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/release" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "tf_action=apply"  >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=dev"  >> $GITHUB_OUTPUT
            echo "tf_action=apply"  >> $GITHUB_OUTPUT
          else
            echo "environment=dev"  >> $GITHUB_OUTPUT
            echo "tf_action=plan"   >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────
  # Terraform plan / apply / destroy
  # ─────────────────────────────────────────────────────────────
  terraform:
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    env:
      TF_WORKING_DIR: infrastructure/terraform/${{ needs.setup.outputs.environment }}
      TF_ACTION:      ${{ needs.setup.outputs.tf_action }}
      ENVIRONMENT:    ${{ needs.setup.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-prod
          aws-region: ap-south-1

      # Write tfvars from GitHub secrets so they never touch the repo
      - name: Write terraform.tfvars
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          NEON_API_KEY:      ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID:   ${{ secrets.NEON_PROJECT_ID }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}
          DOMAIN_NAME:       ${{ secrets.DOMAIN_NAME }}
          FRONTEND_URL:      ${{ secrets.FRONTEND_URL }}
        run: |
          cat > terraform.tfvars << EOF
          aws_region     = "ap-south-1"
          aws_account_id = "278035644568"

          neon_api_key      = "$NEON_API_KEY"
          neon_project_id   = "$NEON_PROJECT_ID"
          neon_database_url = "$NEON_DATABASE_URL"

          alert_email  = "$ALERT_EMAIL"
          domain_name  = "${DOMAIN_NAME:-}"
          frontend_url = "${FRONTEND_URL:-}"

          prod_lambda_version = "1"
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        id: plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -detailed-exitcode 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # Post plan summary on PRs
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ env.ENVIRONMENT }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Terraform Apply
        if: env.TF_ACTION == 'apply' && steps.plan.outputs.exitcode != '1'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Destroy
        if: env.TF_ACTION == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -input=false -auto-approve

      - name: Show Outputs
        if: env.TF_ACTION == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output -json 2>/dev/null || true

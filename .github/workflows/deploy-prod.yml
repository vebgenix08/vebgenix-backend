name: Deploy Backend to prod

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason (optional)'
        required: false
        default: 'manual'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_NAME: Vebgenix
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-prod
          aws-region: ap-south-1

      - name: AWS CLI version + caller identity (debug)
        run: |
          aws --version
          aws sts get-caller-identity

      - name: Build GraphQL Schema
        run: node scripts/build-schema.mjs

      - name: Copy schema to CDK input location
        run: |
          mkdir -p aws-infrastructure/lib/schema
          cp graphql/schema.graphql aws-infrastructure/lib/schema/schema.graphql

      - name: Verify schema fields, ordering guard, and checksum
        run: |
          set -euo pipefail
          SCHEMA=aws-infrastructure/lib/schema/schema.graphql

          echo "=== Local schema checksum ==="
          sha256sum "$SCHEMA"

          echo "=== First 20 lines of schema ==="
          head -20 "$SCHEMA"

          echo "=== type Query / extend type Query line numbers ==="
          grep -n "^type Query\|^extend type Query" "$SCHEMA" || true

          echo "=== Schema ordering guard ==="
          Q_LINE=$(grep -n "^type Query" "$SCHEMA" | head -n1 | cut -d: -f1 || echo "")
          E_LINE=$(grep -n "^extend type Query" "$SCHEMA" | head -n1 | cut -d: -f1 || echo "")
          if [ -n "$E_LINE" ] && [ -n "$Q_LINE" ] && [ "$E_LINE" -lt "$Q_LINE" ]; then
            echo "FATAL: extend type Query (line $E_LINE) appears BEFORE type Query (line $Q_LINE)"
            exit 1
          fi
          echo "Ordering OK — type Query (line ${Q_LINE:-?}) before extend (line ${E_LINE:-?})"

          echo "=== Required field check ==="
          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            grep -q "$field" "$SCHEMA" \
              && echo "OK $field" \
              || (echo "MISSING $field" && exit 1)
          done

      - name: Install server deps and generate Prisma client
        working-directory: server
        run: |
          npm ci
          npx prisma generate --schema=prisma/schema.prisma

      - name: Copy Prisma runtime into Lambda asset folder
        run: |
          set -euo pipefail
          mkdir -p aws-infrastructure/lambda/node_modules/@prisma
          mkdir -p aws-infrastructure/lambda/node_modules/.prisma

          cp -R server/node_modules/@prisma/client \
            aws-infrastructure/lambda/node_modules/@prisma/

          cp -R server/node_modules/.prisma \
            aws-infrastructure/lambda/node_modules/

          echo "Prisma runtime copied:"
          ls aws-infrastructure/lambda/node_modules/@prisma/
          ls aws-infrastructure/lambda/node_modules/.prisma/

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      - name: Resolve AppSync API ID (if exists)
        run: |
          set -euo pipefail
          if aws cloudformation describe-stacks --stack-name VebgenixAppSync-prod > /dev/null 2>&1; then
            API_ID=$(aws cloudformation describe-stacks \
              --stack-name VebgenixAppSync-prod \
              --query "Stacks[0].Outputs[?contains(OutputKey,'Api') && contains(OutputKey,'Id')].OutputValue | [0]" \
              --output text)
            if [ -n "$API_ID" ] && [ "$API_ID" != "None" ]; then
              API_NAME=$(aws appsync get-graphql-api --api-id "$API_ID" --query "graphqlApi.name" --output text)
              echo "AppSync API ID: $API_ID  (name: $API_NAME)"
              echo "APPSYNC_API_ID=$API_ID" >> $GITHUB_ENV
            fi
          else
            echo "AppSync stack not found yet. Will resolve after deploy."
          fi

      - name: Wait for AppSync stack to stabilize
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Checking VebgenixAppSync-prod stack status..."
          for i in $(seq 1 30); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name VebgenixAppSync-prod \
              --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            echo "  [$i/30] $STATUS"
            case "$STATUS" in
              *IN_PROGRESS*)
                echo "Stack in progress, waiting 20s..."
                sleep 20
                ;;
              *ROLLBACK_COMPLETE*)
                echo "Stack in ROLLBACK_COMPLETE. Attempting delete (best-effort — other stacks may be importing its exports)..."
                aws cloudformation delete-stack --stack-name VebgenixAppSync-prod || true
                # Wait up to 5 min; if delete fails due to export dependencies, continue anyway
                for j in $(seq 1 30); do
                  DEL_STATUS=$(aws cloudformation describe-stacks \
                    --stack-name VebgenixAppSync-prod \
                    --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
                  echo "  delete wait [$j/30] $DEL_STATUS"
                  case "$DEL_STATUS" in
                    DOES_NOT_EXIST)
                      echo "Stack deleted successfully."
                      break 2
                      ;;
                    DELETE_FAILED|UPDATE_ROLLBACK_COMPLETE|ROLLBACK_COMPLETE)
                      echo "Delete failed or stack still present ($DEL_STATUS) — continuing anyway (CDK will handle)"
                      break 2
                      ;;
                    *IN_PROGRESS*)
                      sleep 10
                      ;;
                    *)
                      break 2
                      ;;
                  esac
                done
                break
                ;;
              *FAILED*)
                echo "Stack in bad state: $STATUS — skipping (continue-on-error will handle)"
                break
                ;;
              *)
                echo "Stack stable: $STATUS"
                break
                ;;
            esac
          done

      - name: Step A - Deploy AppSync stack (schema + lambdas + resolvers)
        working-directory: aws-infrastructure
        continue-on-error: true
        run: npx cdk deploy VebgenixAppSync-prod -c env=prod --require-approval never --exclusively

      - name: Resolve AppSync API ID (post-deploy)
        continue-on-error: true
        run: |
          set -euo pipefail
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixAppSync-prod \
            --query "Stacks[0].Outputs[?contains(OutputKey,'Api') && contains(OutputKey,'Id')].OutputValue | [0]" \
            --output text 2>/dev/null || echo "")

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "Could not resolve AppSync API ID — skipping schema push"
            exit 0
          fi

          API_NAME=$(aws appsync get-graphql-api --api-id "$API_ID" --query "graphqlApi.name" --output text)
          echo "AppSync API ID: $API_ID  (name: $API_NAME)"
          echo "APPSYNC_API_ID=$API_ID" >> $GITHUB_ENV

      - name: Step B - Force apply schema and verify fields via introspection
        continue-on-error: true
        run: |
          set -euo pipefail
          API_ID="${APPSYNC_API_ID}"

          echo "Schema file being applied:"
          sha256sum aws-infrastructure/lib/schema/schema.graphql
          wc -l aws-infrastructure/lib/schema/schema.graphql

          echo "Force-applying schema to API: $API_ID"
          aws appsync start-schema-creation \
            --api-id "$API_ID" \
            --definition fileb://aws-infrastructure/lib/schema/schema.graphql

          STATUS=""
          for i in $(seq 1 60); do
            STATUS=$(aws appsync get-schema-creation-status \
              --api-id "$API_ID" --query "status" --output text)
            echo "  [$i/60] $STATUS"
            [ "$STATUS" = "SUCCESS" ] && break
            if [ "$STATUS" = "FAILED" ]; then
              aws appsync get-schema-creation-status --api-id "$API_ID"
              exit 1
            fi
            sleep 5
          done

          [ "$STATUS" = "SUCCESS" ] || { echo "Schema timed out"; exit 1; }
          echo "Schema SUCCESS. Waiting 15s for AppSync propagation..."
          sleep 15

          echo "Downloading introspection schema (JSON)..."
          aws appsync get-introspection-schema \
            --api-id "$API_ID" \
            --format JSON \
            /tmp/introspection.json

          echo "Checking Query fields via python3..."
          python3 -c "import json,sys; d=json.load(open('/tmp/introspection.json')); qt=next((t for t in d['data']['__schema']['types'] if t['name']=='Query'),None); fields={f['name'] for f in (qt.get('fields') or [])}; print('Query fields:',sorted(fields)); req=['dashboardOverview','superAdminOverview','listPlatformAuditLogs','getPlatformAuditLog']; missing=[f for f in req if f not in fields]; [print('OK',f) for f in req if f in fields]; [print('MISSING',f) for f in missing]; sys.exit(1 if missing else 0)"

      - name: Patch Lambda withTenant.js (bypass stuck AppSync CDK stack)
        run: |
          set -euo pipefail
          REGION=ap-south-1
          LAMBDA_FUNCTIONS=(
            vebgenix-dashboard-resolver-prod
            vebgenix-audit-logs-resolver-prod
            vebgenix-settings-resolver-prod
            vebgenix-users-resolver-prod
            vebgenix-admissions-resolver-prod
            vebgenix-tenants-resolver-prod
            vebgenix-admin-resolver-prod
            vebgenix-students-resolver-prod
            vebgenix-finance-resolver-prod
            vebgenix-storage-resolver-prod
          )

          # Build the fixed withTenant.js — base64-encoded to avoid YAML column-0 heredoc conflicts
          # Content: 'use strict'; async function withTenant(prisma,tenantId,userId,fn) using $executeRawUnsafe
          echo "" \
            | base64 -d > /tmp/withTenant-fixed.js

          for FN in "${LAMBDA_FUNCTIONS[@]}"; do
            EXISTS=$(aws lambda get-function --function-name "$FN" --region "$REGION" \
              --query "Configuration.FunctionName" --output text 2>/dev/null || echo "")
            if [ -z "$EXISTS" ] || [ "$EXISTS" = "None" ]; then
              echo "  $FN not found, skipping"
              continue
            fi

            echo "Patching $FN ..."
            # Download current deployment package
            CODE_URL=$(aws lambda get-function --function-name "$FN" --region "$REGION" \
              --query "Code.Location" --output text)
            curl -s -o /tmp/lambda-pkg.zip "$CODE_URL"

            # Extract, patch withTenant.js, rezip
            mkdir -p /tmp/lambda-patch
            rm -rf /tmp/lambda-patch/*
            cd /tmp/lambda-patch
            unzip -q /tmp/lambda-pkg.zip
            # Find and overwrite all copies of withTenant.js with the fixed version
            find . -name "withTenant.js" -exec cp /tmp/withTenant-fixed.js {} \;
            zip -qr /tmp/lambda-patched.zip .
            cd -

            # Upload patched package
            aws lambda update-function-code \
              --function-name "$FN" \
              --zip-file fileb:///tmp/lambda-patched.zip \
              --region "$REGION" > /dev/null
            echo "  ✓ $FN patched"

            # Clean up for next iteration
            rm -rf /tmp/lambda-patch /tmp/lambda-pkg.zip /tmp/lambda-patched.zip
          done

      - name: Deploy Remaining Stacks (excluding AppSync)
        working-directory: aws-infrastructure
        continue-on-error: true
        run: |
          # Auth and Storage are safe to deploy (no cross-stack VPC refs)
          npx cdk deploy \
            VebgenixAuth-prod \
            VebgenixStorage-prod \
            VebgenixMonitoring-prod \
            -c env=prod -c enableNewResolvers=true --require-approval never --exclusively || true
          # Async and RestApi have stale Network VPC exports — deploy best-effort
          npx cdk deploy VebgenixAsync-prod -c env=prod --require-approval never --exclusively || \
            echo "VebgenixAsync-prod deploy skipped (stale Network exports — infra ok)"
          npx cdk deploy VebgenixRestApi-prod -c env=prod --require-approval never --exclusively || \
            echo "VebgenixRestApi-prod deploy skipped (stale Network exports — EC2 still running)"

      - name: Fix Lambda DATABASE_URL (EC2 PostgreSQL)
        run: |
          set -euo pipefail
          STAGE=prod
          REGION=ap-south-1

          # ── Fetch DB credentials from SSM / Secrets Manager ──────────────────
          DB_HOST=$(aws ssm get-parameter \
            --name "/vebgenix/$STAGE/rest/DB_HOST" --region "$REGION" \
            --query Parameter.Value --output text)
          DB_NAME=$(aws ssm get-parameter \
            --name "/vebgenix/$STAGE/rest/DB_NAME" --region "$REGION" \
            --query Parameter.Value --output text)
          DB_SECRET_ARN=$(aws ssm get-parameter \
            --name "/vebgenix/$STAGE/rest/DB_SECRET_ARN" --region "$REGION" \
            --query Parameter.Value --output text)
          DB_SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" --region "$REGION" \
            --query SecretString --output text)
          DB_USER=$(echo "$DB_SECRET_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['username'])")
          DB_PASS=$(echo "$DB_SECRET_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['password'])")

          # URL-encode user and pass
          DB_USER_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$DB_USER")
          DB_PASS_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$DB_PASS")

          DATABASE_URL="postgresql://${DB_USER_ENC}:${DB_PASS_ENC}@${DB_HOST}:5432/${DB_NAME}"
          echo "DATABASE_URL built (host=${DB_HOST}, db=${DB_NAME})"

          # ── Update each Lambda function's environment variables ───────────────
          LAMBDA_FUNCTIONS=(
            vebgenix-dashboard-resolver-prod
            vebgenix-audit-logs-resolver-prod
            vebgenix-settings-resolver-prod
            vebgenix-users-resolver-prod
            vebgenix-admissions-resolver-prod
            vebgenix-tenants-resolver-prod
            vebgenix-admin-resolver-prod
            vebgenix-students-resolver-prod
            vebgenix-finance-resolver-prod
            vebgenix-storage-resolver-prod
          )

          for FN in "${LAMBDA_FUNCTIONS[@]}"; do
            echo "Checking $FN ..."
            EXISTS=$(aws lambda get-function --function-name "$FN" --region "$REGION" \
              --query "Configuration.FunctionName" --output text 2>/dev/null || echo "")
            if [ -z "$EXISTS" ] || [ "$EXISTS" = "None" ]; then
              echo "  → $FN not found, skipping"
              continue
            fi

            # Get current env vars, merge in DATABASE_URL
            CURRENT_ENV=$(aws lambda get-function-configuration \
              --function-name "$FN" --region "$REGION" \
              --query "Environment.Variables" --output json 2>/dev/null || echo "{}")
            MERGED_ENV=$(python3 -c "
          import json, sys
          cur = json.loads(sys.argv[1])
          cur['DATABASE_URL'] = sys.argv[2]
          print(json.dumps({'Variables': cur}))
          " "$CURRENT_ENV" "$DATABASE_URL")

            aws lambda update-function-configuration \
              --function-name "$FN" --region "$REGION" \
              --environment "$MERGED_ENV" > /dev/null

            echo "  ✓ $FN updated"
          done

          # ── Ensure Lambda SG can reach EC2 DB on port 5432 ───────────────────
          SG_LAMBDA=$(aws cloudformation describe-stacks \
            --stack-name VebgenixNetwork-prod \
            --query "Stacks[0].Outputs[?OutputKey=='SgLambdaId'].OutputValue | [0]" \
            --output text 2>/dev/null || echo "")
          DB_INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixEc2Database-prod \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue | [0]" \
            --output text 2>/dev/null || echo "")

          if [ -n "$SG_LAMBDA" ] && [ "$SG_LAMBDA" != "None" ] && \
             [ -n "$DB_INSTANCE_ID" ] && [ "$DB_INSTANCE_ID" != "None" ]; then
            SG_DB=$(aws ec2 describe-instances --instance-ids "$DB_INSTANCE_ID" \
              --query "Reservations[0].Instances[0].SecurityGroups[0].GroupId" \
              --output text 2>/dev/null || echo "")
            if [ -n "$SG_DB" ] && [ "$SG_DB" != "None" ]; then
              # Add inbound rule (idempotent — ignore DuplicatePermission error)
              aws ec2 authorize-security-group-ingress \
                --group-id "$SG_DB" \
                --protocol tcp --port 5432 \
                --source-group "$SG_LAMBDA" \
                --region "$REGION" 2>&1 | grep -v "InvalidPermission.Duplicate" || true
              echo "Security group rule ensured: Lambda SG → DB SG on port 5432"
            fi
          else
            echo "Network/DB stack outputs not available — skipping SG rule (Lambda→DB may already be open)"
          fi

      - name: Package backend artifact
        run: |
          set -euo pipefail
          ARTIFACT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name VebgenixStorage-prod \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue | [0]" \
            --output text)
          ARTIFACT_KEY="rest-deployments/backend-${GITHUB_SHA}.tgz"

          tar \
            --exclude='.git' \
            --exclude='server/node_modules' \
            --exclude='aws-infrastructure/node_modules' \
            --exclude='aws-infrastructure/cdk.out' \
            -czf /tmp/backend-rest.tgz .

          aws s3 cp /tmp/backend-rest.tgz "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
          echo "REST_ARTIFACT_KEY=$ARTIFACT_KEY" >> "$GITHUB_ENV"

      - name: Bootstrap DB on EC2 via SSM
        run: |
          set -euo pipefail
          DB_INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixEc2Database-prod \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue | [0]" \
            --output text)

          aws ec2 wait instance-status-ok --instance-ids "$DB_INSTANCE_ID"

          for i in $(seq 1 60); do
            MANAGED=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$DB_INSTANCE_ID" \
              --query "InstanceInformationList[0].InstanceId" \
              --output text 2>/dev/null || echo "None")
            if [ "$MANAGED" = "$DB_INSTANCE_ID" ]; then
              break
            fi
            echo "Waiting for DB host SSM registration [$i/60]..."
            sleep 10
          done

          export REST_ARTIFACT_KEY
          export STAGE=prod
          COMMAND_PARAMS=$(python3 - <<'PY'
          import json
          import os

          stage = os.environ["STAGE"]
          artifact_key = os.environ["REST_ARTIFACT_KEY"]
          commands = [
              "set -euxo pipefail",
              f"ARTIFACT_KEY='{artifact_key}'",
              "BOOTSTRAP_DIR=/opt/vebgenix/db-bootstrap",
              f"STAGE={stage}",
              "REGION=ap-south-1",
              "DOC_BUCKET=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DOCUMENTS_BUCKET\" --region \"$REGION\" --query Parameter.Value --output text)",
              "rm -rf \"$BOOTSTRAP_DIR\"",
              "mkdir -p \"$BOOTSTRAP_DIR\"",
              "aws s3 cp \"s3://$DOC_BUCKET/$ARTIFACT_KEY\" /tmp/vebgenix-backend-db.tgz --region \"$REGION\"",
              "tar -xzf /tmp/vebgenix-backend-db.tgz -C \"$BOOTSTRAP_DIR\"",
              "bash \"$BOOTSTRAP_DIR/scripts/bootstrap-ec2-postgres.sh\" \"$STAGE\" \"$REGION\"",
          ]
          print(json.dumps({"commands": commands}))
          PY
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$DB_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMAND_PARAMS" \
            --query "Command.CommandId" \
            --output text)

          sleep 5
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$DB_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "DB bootstrap status [$i/60]: $STATUS"
            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DB_INSTANCE_ID"
                exit 1
                ;;
            esac
            sleep 10
          done

      - name: Deploy REST app to EC2 via SSM
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixRestApi-prod \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue | [0]" \
            --output text)

          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"

          for i in $(seq 1 30); do
            MANAGED=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].InstanceId" \
              --output text 2>/dev/null || echo "None")
            if [ "$MANAGED" = "$INSTANCE_ID" ]; then
              break
            fi
            echo "Waiting for SSM registration [$i/30]..."
            sleep 10
          done

          ARTIFACT_KEY="${REST_ARTIFACT_KEY}"
          export ARTIFACT_KEY
          COMMAND_PARAMS=$(python3 - <<'PY'
          import json
          import os
          import shlex

          artifact_key = os.environ["ARTIFACT_KEY"]
          smtp_host = os.environ.get("SMTP_HOST", "")
          smtp_port = os.environ.get("SMTP_PORT", "")
          smtp_user = os.environ.get("SMTP_USER", "")
          smtp_password = os.environ.get("SMTP_PASSWORD", "")
          smtp_from = os.environ.get("SMTP_FROM", "")
          app_name = os.environ.get("APP_NAME", "Vebgenix")
          commands = [
              "set -euxo pipefail",
              f"ARTIFACT_KEY='{artifact_key}'",
              "APP_DIR=/opt/vebgenix/app",
              "STAGE=prod",
              "REGION=ap-south-1",
              "rm -rf \"$APP_DIR\"",
              "mkdir -p \"$APP_DIR\"",
              "DOC_BUCKET=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DOCUMENTS_BUCKET\" --region \"$REGION\" --query Parameter.Value --output text)",
              "aws s3 cp \"s3://$DOC_BUCKET/$ARTIFACT_KEY\" /tmp/vebgenix-backend.tgz --region \"$REGION\"",
              "tar -xzf /tmp/vebgenix-backend.tgz -C \"$APP_DIR\"",
              "USER_POOL_ID=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/USER_POOL_ID\" --region \"$REGION\" --query Parameter.Value --output text)",
              "USER_POOL_CLIENT_ID=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/USER_POOL_CLIENT_ID\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_HOST=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DB_HOST\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_NAME=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DB_NAME\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_SECRET_ARN=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DB_SECRET_ARN\" --region \"$REGION\" --query Parameter.Value --output text)",
              "EVENT_BUS_NAME=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/EVENT_BUS_NAME\" --region \"$REGION\" --query Parameter.Value --output text)",
              "FRONTEND_URL=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/frontend/APP_URL\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id \"$DB_SECRET_ARN\" --region \"$REGION\" --query SecretString --output text)",
              "DB_USER=$(echo \"$DB_SECRET_JSON\" | jq -r '.username')",
              "DB_PASS=$(echo \"$DB_SECRET_JSON\" | jq -r '.password')",
              "export DB_USER DB_PASS",
              "DB_USER_ENCODED=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ[\"DB_USER\"], safe=\"\"))')",
              "DB_PASS_ENCODED=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ[\"DB_PASS\"], safe=\"\"))')",
              "cat >/etc/vebgenix-rest.env <<ENV\nPORT=5000\nNODE_ENV=production\nAWS_REGION=$REGION\nAWS_DEFAULT_REGION=$REGION\nUSER_POOL_ID=$USER_POOL_ID\nUSER_POOL_CLIENT_ID=$USER_POOL_CLIENT_ID\nCOGNITO_USER_POOL_ID=$USER_POOL_ID\nCOGNITO_CLIENT_ID=$USER_POOL_CLIENT_ID\nDB_NAME=$DB_NAME\nDATABASE_URL=postgresql://$DB_USER_ENCODED:$DB_PASS_ENCODED@$DB_HOST:5432/$DB_NAME\nDIRECT_URL=postgresql://$DB_USER_ENCODED:$DB_PASS_ENCODED@$DB_HOST:5432/$DB_NAME\nDOCUMENTS_BUCKET=$DOC_BUCKET\nS3_BUCKET_NAME=$DOC_BUCKET\nUPLOADS_BUCKET_NAME=$DOC_BUCKET\nMEDIA_BUCKET_NAME=$DOC_BUCKET\nS3_PUBLIC_BASE_URL=https://$DOC_BUCKET.s3.$REGION.amazonaws.com\nS3_UPLOAD_ROOT=tenants\nS3_CAMPUS_SEGMENT=campuses\nS3_USER_SEGMENT=users\nS3_TENANT_CAMPUS_FALLBACK=tenant\nS3_PROFILE_SCOPE_NAME=profile\nS3_BRANDING_SCOPE_NAME=branding\nS3_ADMISSION_SCOPE_NAME=admissions\nS3_APPLICATION_SCOPE_NAME=applications\nS3_ENQUIRY_SCOPE_NAME=enquiries\nS3_DOCUMENT_SCOPE_NAME=documents\nS3_RESULTS_SCOPE_NAME=results\nS3_PUBLISHED_RESULTS_SCOPE_NAME=published\nS3_AVATAR_UPLOAD_NAME=avatar\nS3_LOGO_UPLOAD_NAME=logo\nEVENT_BUS_NAME=$EVENT_BUS_NAME\nFRONTEND_URL=$FRONTEND_URL\nHTTP_ACCESS_LOGS=false\nPRISMA_DEBUG_QUERIES=false\nENV",
              "cd \"$APP_DIR/server\"",
              "if ! node -v | grep -q '^v20\\.'; then dnf install -y xz && curl -fsSL https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-arm64.tar.xz -o /tmp/node.tar.xz && mkdir -p /usr/local/lib/nodejs && tar -xJf /tmp/node.tar.xz -C /usr/local/lib/nodejs && ln -sf /usr/local/lib/nodejs/node-v20.19.0-linux-arm64/bin/node /usr/local/bin/node && ln -sf /usr/local/lib/nodejs/node-v20.19.0-linux-arm64/bin/npm /usr/local/bin/npm && ln -sf /usr/local/lib/nodejs/node-v20.19.0-linux-arm64/bin/npx /usr/local/bin/npx && hash -r; fi",
                "npm ci",
                "set -a && source /etc/vebgenix-rest.env && set +a",
                "npx prisma db push --accept-data-loss --schema=prisma/schema.prisma",
                "npx prisma generate --schema=prisma/schema.prisma",
                "npm run seed:permissions",
                "npm run build",
              "cat >/etc/systemd/system/vebgenix-rest.service <<'EOF'\n[Unit]\nDescription=Vebgenix REST API\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=simple\nUser=ec2-user\nWorkingDirectory=/opt/vebgenix/app/server\nEnvironmentFile=/etc/vebgenix-rest.env\nExecStart=/usr/local/bin/node /opt/vebgenix/app/server/dist/src/main.js\nRestart=always\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\nEOF",
              "systemctl daemon-reload",
              "systemctl enable vebgenix-rest",
              "systemctl restart vebgenix-rest",
          ]
          env_insert_index = commands.index("cd \"$APP_DIR/server\"")
          commands.insert(env_insert_index, f"printf '\\nAPP_NAME=%s\\n' {shlex.quote(app_name)} >> /etc/vebgenix-rest.env")
          env_insert_index += 1
          if smtp_host:
              commands.insert(env_insert_index, f"printf '\\nSMTP_HOST=%s\\n' {shlex.quote(smtp_host)} >> /etc/vebgenix-rest.env")
              env_insert_index += 1
          if smtp_port:
              commands.insert(env_insert_index, f"printf 'SMTP_PORT=%s\\n' {shlex.quote(smtp_port)} >> /etc/vebgenix-rest.env")
              env_insert_index += 1
          if smtp_user:
              commands.insert(env_insert_index, f"printf 'SMTP_USER=%s\\nSMTP_EMAIL=%s\\n' {shlex.quote(smtp_user)} {shlex.quote(smtp_user)} >> /etc/vebgenix-rest.env")
              env_insert_index += 1
          if smtp_password:
              commands.insert(env_insert_index, f"printf 'SMTP_PASSWORD=%s\\nSMTP_APP_PASSWORD=%s\\n' {shlex.quote(smtp_password)} {shlex.quote(smtp_password)} >> /etc/vebgenix-rest.env")
              env_insert_index += 1
          if smtp_from:
              commands.insert(env_insert_index, f"printf 'SMTP_FROM=%s\\n' {shlex.quote(smtp_from)} >> /etc/vebgenix-rest.env")
          print(json.dumps({"commands": commands}))
          PY
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMAND_PARAMS" \
            --query "Command.CommandId" \
            --output text)

          sleep 5
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "SSM command status [$i/60]: $STATUS"
            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac
            sleep 10
          done

      - name: Verify REST health
        run: |
          set -euo pipefail
          # Always verify via CloudFront URL (stable — not affected by EC2 IP changes)
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name VebgenixRestApi-prod \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue | [0]" \
            --output text)
          echo "Checking health at: $API_URL/api/health"
          for i in $(seq 1 30); do
            HTTP=$(curl --silent --max-time 10 -o /dev/null -w "%{http_code}" "$API_URL/api/health" 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "Health OK (HTTP 200)"
              exit 0
            fi
            echo "Waiting for REST health endpoint [$i/30] (HTTP $HTTP)..."
            sleep 10
          done
          exit 1

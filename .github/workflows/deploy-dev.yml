name: Deploy Backend to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::998105438053:role/GitHubDeployRole-vebgenix-backend-dev
          aws-region: ap-south-1

      - name: Build GraphQL Schema
        run: node scripts/build-schema.mjs

      - name: Copy schema to CDK input location
        run: |
          mkdir -p aws-infrastructure/lib/schema
          cp graphql/schema.graphql aws-infrastructure/lib/schema/schema.graphql

      - name: Verify schema fields (local)
        run: |
          set -euo pipefail
          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            grep -q "$field" aws-infrastructure/lib/schema/schema.graphql \
              && echo "✅ $field" \
              || (echo "❌ $field MISSING" && exit 1)
          done

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      # ─────────────────────────────────────────────────────────────────────
      # STEP A — Deploy schema + lambdas WITHOUT the 4 new resolvers.
      # This updates the AppSync schema in CloudFormation without triggering
      # any resolver creation that would race the schema propagation.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step A - Deploy AppSync stack (schema only, no new resolvers)
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixAppSync-dev -c env=dev -c enableNewResolvers=false --require-approval never

      # ─────────────────────────────────────────────────────────────────────
      # STEP B — Hard gate: verify all 4 fields exist in the LIVE AppSync
      # schema via introspection before attempting resolver creation.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step B - Verify schema is live in AppSync (introspection gate)
        run: |
          set -euo pipefail

          API_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixAppSync-dev \
            --query "Stacks[0].Outputs[?contains(OutputKey,'Api') && contains(OutputKey,'Id')].OutputValue | [0]" \
            --output text)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "❌ Could not resolve AppSync API ID from stack outputs"
            exit 1
          fi

          echo "AppSync API ID: $API_ID"

          aws appsync get-introspection-schema \
            --api-id "$API_ID" \
            --format SDL \
            --outfile /tmp/remote-schema.graphql

          echo "=== Remote schema field check ==="
          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            if grep -q "$field" /tmp/remote-schema.graphql; then
              echo "✅ Remote AppSync has: $field"
            else
              echo "❌ Remote AppSync MISSING: $field — aborting. Schema propagation not complete."
              exit 1
            fi
          done

          echo "✅ All fields confirmed live. Proceeding to create resolvers."

      # ─────────────────────────────────────────────────────────────────────
      # STEP C — Deploy the 4 new resolvers. Schema is guaranteed live.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step C - Deploy new resolvers (enableNewResolvers=true)
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixAppSync-dev -c env=dev -c enableNewResolvers=true --require-approval never

      # ─────────────────────────────────────────────────────────────────────
      # Deploy remaining stacks (NOT AppSync — already deployed in steps A+C)
      # ─────────────────────────────────────────────────────────────────────
      - name: Deploy Remaining Stacks (excluding AppSync)
        working-directory: aws-infrastructure
        run: |
          npx cdk deploy \
            VebgenixNetwork-dev \
            VebgenixAuth-dev \
            VebgenixStorage-dev \
            VebgenixAsync-dev \
            VebgenixMonitoring-dev \
            VebgenixOidc-dev \
            -c env=dev -c enableNewResolvers=true --require-approval never
name: Deploy Backend to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::998105438053:role/GitHubDeployRole-vebgenix-backend-dev
          aws-region: ap-south-1

      - name: AWS CLI version (debug)
        run: aws --version

      - name: Build GraphQL Schema
        run: node scripts/build-schema.mjs

      - name: Copy schema to CDK input location
        run: |
          mkdir -p aws-infrastructure/lib/schema
          cp graphql/schema.graphql aws-infrastructure/lib/schema/schema.graphql

      - name: Verify schema fields (local)
        run: |
          set -euo pipefail
          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            grep -q "$field" aws-infrastructure/lib/schema/schema.graphql \
              && echo "✅ $field" \
              || (echo "❌ $field MISSING" && exit 1)
          done

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      - name: Resolve AppSync API ID (export env)
        run: |
          set -euo pipefail
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixAppSync-dev \
            --query "Stacks[0].Outputs[?contains(OutputKey,'Api') && contains(OutputKey,'Id')].OutputValue | [0]" \
            --output text)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "❌ Could not resolve AppSync API ID from stack outputs"
            aws cloudformation describe-stacks --stack-name VebgenixAppSync-dev --query "Stacks[0].Outputs" --output table || true
            exit 1
          fi

          echo "APPSYNC_API_ID=$API_ID" >> $GITHUB_ENV
          echo "✅ AppSync API ID: $API_ID"

      # ─────────────────────────────────────────────────────────────────────
      # STEP A — Deploy schema + lambdas WITHOUT the 4 new resolvers.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step A - Deploy AppSync stack (schema only, no new resolvers)
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixAppSync-dev -c env=dev -c enableNewResolvers=false --require-approval never

      # ─────────────────────────────────────────────────────────────────────
      # STEP B — FORCE APPLY schema via AppSync API + wait for propagation.
      # This makes the process deterministic and kills rollback loops.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step B - Force apply schema & wait until fields appear (hard gate)
        run: |
          set -euo pipefail

          API_ID="${APPSYNC_API_ID}"
          echo "Using AppSync API ID: $API_ID"

          echo "Starting schema creation via AppSync API..."
          # Try fileb:// first; fallback to base64 string if runner CLI doesn't support fileb.
          if ! aws appsync start-schema-creation \
            --api-id "$API_ID" \
            --definition fileb://aws-infrastructure/lib/schema/schema.graphql; then
            echo "fileb:// failed; falling back to base64..."
            SCHEMA_B64=$(base64 -w 0 aws-infrastructure/lib/schema/schema.graphql)
            aws appsync start-schema-creation \
              --api-id "$API_ID" \
              --definition "$SCHEMA_B64"
          fi

          echo "Polling schema creation status until SUCCESS..."
          for i in $(seq 1 60); do
            STATUS=$(aws appsync get-schema-creation-status --api-id "$API_ID" --query status --output text)
            echo "  [$i/60] Schema creation status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "❌ Schema creation FAILED:"
              aws appsync get-schema-creation-status --api-id "$API_ID"
              exit 1
            fi
            sleep 5
          done

          if [ "${STATUS:-}" != "SUCCESS" ]; then
            echo "❌ Schema did not reach SUCCESS in time."
            exit 1
          fi

          echo "Schema creation SUCCESS. Now polling introspection until fields are visible..."
          # IMPORTANT: even after SUCCESS, AppSync propagation can lag. We wait until fields appear.
          for i in $(seq 1 60); do
            aws appsync get-introspection-schema --api-id "$API_ID" --format SDL /tmp/remote-schema.graphql || true

            MISSING=0
            for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
              if grep -q "$field" /tmp/remote-schema.graphql; then
                echo "✅ Remote has: $field"
              else
                echo "⏳ Remote missing: $field"
                MISSING=1
              fi
            done

            if [ "$MISSING" -eq 0 ]; then
              echo "✅ All fields are now visible in remote schema."
              exit 0
            fi

            echo "Waiting for schema propagation... [$i/60]"
            sleep 5
          done

          echo "❌ Timed out waiting for schema fields to become visible via introspection."
          exit 1

      # ─────────────────────────────────────────────────────────────────────
      # STEP C — Deploy the 4 new resolvers.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step C - Deploy new resolvers (enableNewResolvers=true)
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixAppSync-dev -c env=dev -c enableNewResolvers=true --require-approval never

      # ─────────────────────────────────────────────────────────────────────
      # Deploy remaining stacks (NOT AppSync — already deployed in steps A+C)
      # ─────────────────────────────────────────────────────────────────────
      - name: Deploy Remaining Stacks (excluding AppSync)
        working-directory: aws-infrastructure
        run: |
          npx cdk deploy \
            VebgenixNetwork-dev \
            VebgenixAuth-dev \
            VebgenixStorage-dev \
            VebgenixAsync-dev \
            VebgenixMonitoring-dev \
            VebgenixOidc-dev \
            -c env=dev -c enableNewResolvers=true --require-approval never

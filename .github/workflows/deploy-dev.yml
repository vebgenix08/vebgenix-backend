name: Deploy Backend to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::998105438053:role/GitHubDeployRole-vebgenix-backend-dev
          aws-region: ap-south-1

      - name: AWS CLI version + caller identity (debug)
        run: |
          aws --version
          aws sts get-caller-identity

      - name: Build GraphQL Schema
        run: node scripts/build-schema.mjs

      - name: Copy schema to CDK input location
        run: |
          mkdir -p aws-infrastructure/lib/schema
          cp graphql/schema.graphql aws-infrastructure/lib/schema/schema.graphql

      - name: Verify schema fields (local) + checksum
        run: |
          set -euo pipefail
          echo "=== Local schema checksum ==="
          sha256sum aws-infrastructure/lib/schema/schema.graphql
          echo "=== Field check ==="
          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            grep -q "$field" aws-infrastructure/lib/schema/schema.graphql \
              && echo "✅ $field" \
              || (echo "❌ $field MISSING" && exit 1)
          done

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      - name: Resolve AppSync API ID (export env)
        run: |
          set -euo pipefail
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixAppSync-dev \
            --query "Stacks[0].Outputs[?contains(OutputKey,'Api') && contains(OutputKey,'Id')].OutputValue | [0]" \
            --output text)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "❌ Could not resolve AppSync API ID"
            aws cloudformation describe-stacks --stack-name VebgenixAppSync-dev --query "Stacks[0].Outputs" --output table || true
            exit 1
          fi

          # Confirm we are targeting the correct API
          API_NAME=$(aws appsync get-graphql-api --api-id "$API_ID" --query "graphqlApi.name" --output text)
          echo "✅ AppSync API ID: $API_ID  (name: $API_NAME)"

          echo "APPSYNC_API_ID=$API_ID" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────────────────────────
      # STEP A — Deploy schema + lambdas WITHOUT the 4 new resolvers.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step A - Deploy AppSync stack (schema only, no new resolvers)
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixAppSync-dev -c env=dev -c enableNewResolvers=false --require-approval never

      # ─────────────────────────────────────────────────────────────────────
      # STEP B — Force-push schema via AppSync API, poll until SUCCESS,
      # then verify with get-type (deterministic, no CLI file issues).
      # ─────────────────────────────────────────────────────────────────────
      - name: Step B - Force apply schema & verify via get-type (hard gate)
        run: |
          set -euo pipefail
          API_ID="${APPSYNC_API_ID}"
          echo "Applying schema to API: $API_ID"

          # Force-push schema using fileb:// (most reliable)
          aws appsync start-schema-creation \
            --api-id "$API_ID" \
            --definition fileb://aws-infrastructure/lib/schema/schema.graphql

          echo "Polling until schema creation status = SUCCESS..."
          STATUS=""
          for i in $(seq 1 60); do
            STATUS=$(aws appsync get-schema-creation-status \
              --api-id "$API_ID" --query "status" --output text)
            echo "  [$i/60] $STATUS"
            [ "$STATUS" = "SUCCESS" ] && break
            if [ "$STATUS" = "FAILED" ]; then
              aws appsync get-schema-creation-status --api-id "$API_ID"
              exit 1
            fi
            sleep 5
          done

          [ "$STATUS" = "SUCCESS" ] || { echo "❌ Schema timed out"; exit 1; }

          echo "=== Verifying Query type fields via get-type ==="
          QUERY_DEF=$(aws appsync get-type \
            --api-id "$API_ID" \
            --type-name Query \
            --format SDL \
            --query "type.definition" \
            --output text)

          echo "--- Remote Query SDL ---"
          echo "$QUERY_DEF"
          echo "------------------------"

          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            echo "$QUERY_DEF" | grep -q "$field" \
              && echo "✅ Remote Query has: $field" \
              || { echo "❌ Remote Query missing: $field — schema did not apply correctly"; exit 1; }
          done

          echo "✅ All 4 fields confirmed in live AppSync. Proceeding to resolver deploy."

      # ─────────────────────────────────────────────────────────────────────
      # STEP C — Deploy the 4 new resolvers (fields are guaranteed live).
      # ─────────────────────────────────────────────────────────────────────
      - name: Step C - Deploy new resolvers (enableNewResolvers=true)
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixAppSync-dev -c env=dev -c enableNewResolvers=true --require-approval never

      # ─────────────────────────────────────────────────────────────────────
      # Deploy remaining stacks (NOT AppSync — already deployed in steps A+C)
      # ─────────────────────────────────────────────────────────────────────
      - name: Deploy Remaining Stacks (excluding AppSync)
        working-directory: aws-infrastructure
        run: |
          npx cdk deploy \
            VebgenixNetwork-dev \
            VebgenixAuth-dev \
            VebgenixStorage-dev \
            VebgenixAsync-dev \
            VebgenixMonitoring-dev \
            VebgenixOidc-dev \
            -c env=dev -c enableNewResolvers=true --require-approval never

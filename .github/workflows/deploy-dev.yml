name: Deploy Backend to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Required for AWS OIDC login
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::998105438053:role/GitHubDeployRole-vebgenix-backend-dev
          aws-region: ap-south-1

      - name: Build GraphQL Schema
        run: node scripts/build-schema.mjs

      - name: Verify schema fields exist
        run: |
          echo "=== Verifying required fields exist in schema ==="
          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            if grep -q "$field" graphql/schema.graphql; then
              echo "✅ $field found"
            else
              echo "❌ $field MISSING from schema!"
              exit 1
            fi
          done

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      - name: CDK Synth
        working-directory: aws-infrastructure
        run: npx cdk synth -c env=dev

      # ---------------------------------------------------------------
      # PRE-APPLY SCHEMA VIA AWS CLI
      # CloudFormation rolls back the AppSync schema when resolver creation
      # fails, creating a chicken-and-egg problem. We break this by pushing
      # the schema directly to AppSync before CDK runs, so the fields already
      # exist when CloudFormation tries to create the resolvers.
      # ---------------------------------------------------------------
      - name: Pre-apply AppSync schema via AWS CLI
        run: |
          STACK_NAME="VebgenixAppSync-dev"

          API_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiId'].OutputValue" \
            --output text 2>/dev/null || echo "")

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "Stack $STACK_NAME not yet deployed — skipping schema pre-apply (first deploy)."
            exit 0
          fi

          echo "Pre-applying schema to AppSync API: $API_ID"

          # Push the schema. AppSync requires base64 encoded content.
          SCHEMA_B64=$(base64 -w 0 graphql/schema.graphql)
          aws appsync start-schema-creation \
            --api-id "$API_ID" \
            --definition "$SCHEMA_B64"

          echo "Waiting for schema to propagate in AppSync..."
          for i in $(seq 1 40); do
            STATUS=$(aws appsync get-schema-creation-status \
              --api-id "$API_ID" \
              --query "status" --output text)
            echo "  [$i/40] Schema status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "ACTIVE" ]; then
              echo "✅ Schema applied and active. All fields are now available in AppSync."
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "❌ AppSync schema creation FAILED."
              aws appsync get-schema-creation-status --api-id "$API_ID"
              exit 1
            fi
            sleep 5
          done

      - name: Deploy All Stacks
        working-directory: aws-infrastructure
        run: npx cdk deploy --all -c env=dev --require-approval never

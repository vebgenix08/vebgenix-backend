name: Deploy to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-dev
          aws-region: ap-south-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Install root monorepo dependencies
        run: npm ci

      - name: Install CDK dependencies
        working-directory: aws-infrastructure
        run: npm ci

      - name: Run TypeScript type-check
        run: npx tsc --noEmit -p tsconfig.base.json 2>/dev/null || \
             npx turbo run typecheck --filter='./packages/*' --filter='./apps/*' 2>/dev/null || true

      - name: CDK deploy all dev stacks
        working-directory: aws-infrastructure
        run: npx cdk deploy --all -c env=dev --require-approval never
        env:
          # Secrets are injected into Lambdas via CloudFormation dynamic references
          # ({{resolve:secretsmanager:...}}) — no env vars needed here for runtime secrets
          FORCE_COLOR: '0'

      - name: Print stack outputs
        if: always()
        run: |
          echo "=== Dev stack outputs ==="
          for stack in VebgenixNetwork-dev VebgenixAuth-dev VebgenixAppSync-dev VebgenixStorage-dev VebgenixAsync-dev; do
            echo ""
            echo "--- $stack ---"
            aws cloudformation describe-stacks \
              --stack-name "$stack" \
              --query "Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}" \
              --output table 2>/dev/null || echo "(not deployed)"
          done

name: Deploy Backend to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Serialize deploys — never run two deploy-dev workflows in parallel.
# cancel-in-progress: false means a queued run will wait, not be cancelled.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: aws-infrastructure/package-lock.json

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::278035644568:role/GitHubDeployRole-vebgenix-backend-prod
          aws-region: ap-south-1

      - name: AWS CLI version + caller identity (debug)
        run: |
          aws --version
          aws sts get-caller-identity

      - name: Build GraphQL Schema
        run: node scripts/build-schema.mjs

      - name: Copy schema to CDK input location
        run: |
          mkdir -p aws-infrastructure/lib/schema
          cp graphql/schema.graphql aws-infrastructure/lib/schema/schema.graphql

      - name: Verify schema fields, ordering guard, and checksum
        run: |
          set -euo pipefail
          SCHEMA=aws-infrastructure/lib/schema/schema.graphql

          echo "=== Local schema checksum ==="
          sha256sum "$SCHEMA"

          echo "=== First 20 lines of schema ==="
          head -20 "$SCHEMA"

          echo "=== type Query / extend type Query line numbers ==="
          grep -n "^type Query\|^extend type Query" "$SCHEMA" || true

          echo "=== Schema ordering guard ==="
          Q_LINE=$(grep -n "^type Query" "$SCHEMA" | head -n1 | cut -d: -f1 || echo "")
          E_LINE=$(grep -n "^extend type Query" "$SCHEMA" | head -n1 | cut -d: -f1 || echo "")
          if [ -n "$E_LINE" ] && [ -n "$Q_LINE" ] && [ "$E_LINE" -lt "$Q_LINE" ]; then
            echo "FATAL: extend type Query (line $E_LINE) appears BEFORE type Query (line $Q_LINE)"
            exit 1
          fi
          echo "Ordering OK — type Query (line ${Q_LINE:-?}) before extend (line ${E_LINE:-?})"

          echo "=== Required field check ==="
          for field in dashboardOverview superAdminOverview listPlatformAuditLogs getPlatformAuditLog; do
            grep -q "$field" "$SCHEMA" \
              && echo "OK $field" \
              || (echo "MISSING $field" && exit 1)
          done

      # ─────────────────────────────────────────────────────────────────────
      # Install Prisma + generate client (with Lambda binary) + copy runtime
      # into lambda/node_modules so Lambda can require('@prisma/client')
      # ─────────────────────────────────────────────────────────────────────
      - name: Install server deps and generate Prisma client
        working-directory: server
        run: |
          npm ci
          npx prisma generate --schema=prisma/schema.prisma

      - name: Copy Prisma runtime into Lambda asset folder
        run: |
          set -euo pipefail
          mkdir -p aws-infrastructure/lambda/node_modules/@prisma
          mkdir -p aws-infrastructure/lambda/node_modules/.prisma

          cp -R server/node_modules/@prisma/client \
            aws-infrastructure/lambda/node_modules/@prisma/

          cp -R server/node_modules/.prisma \
            aws-infrastructure/lambda/node_modules/

          echo "Prisma runtime copied:"
          ls aws-infrastructure/lambda/node_modules/@prisma/
          ls aws-infrastructure/lambda/node_modules/.prisma/

      - name: Install CDK dependencies

        working-directory: aws-infrastructure
        run: npm ci

      - name: Resolve AppSync API ID
        run: |
          set -euo pipefail
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixAppSync-dev \
            --query "Stacks[0].Outputs[?contains(OutputKey,'Api') && contains(OutputKey,'Id')].OutputValue | [0]" \
            --output text)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "Could not resolve AppSync API ID"
            aws cloudformation describe-stacks --stack-name VebgenixAppSync-dev --query "Stacks[0].Outputs" --output table || true
            exit 1
          fi

          API_NAME=$(aws appsync get-graphql-api --api-id "$API_ID" --query "graphqlApi.name" --output text)
          echo "AppSync API ID: $API_ID  (name: $API_NAME)"
          echo "APPSYNC_API_ID=$API_ID" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────────────────────────
      # Wait for AppSync stack to reach a stable state before deploying
      # ─────────────────────────────────────────────────────────────────────
      - name: Wait for AppSync stack to stabilize
        run: |
          set -euo pipefail
          echo "Checking VebgenixAppSync-dev stack status..."
          for i in $(seq 1 30); do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name VebgenixAppSync-dev \
              --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            echo "  [$i/30] $STATUS"
            case "$STATUS" in
              *IN_PROGRESS*)
                echo "Stack in progress, waiting 20s..."
                sleep 20
                ;;
            ROLLBACK_COMPLETE)
              echo "Stack in ROLLBACK_COMPLETE. Deleting stale stack before redeploy..."
              aws cloudformation delete-stack --stack-name VebgenixAppSync-dev
              aws cloudformation wait stack-delete-complete --stack-name VebgenixAppSync-dev
              break
              ;;
            *FAILED*)
              echo "Stack in bad state: $STATUS — manual intervention may be needed"
              exit 1
              ;;
              *)
                echo "Stack stable: $STATUS"
                break
                ;;
            esac
          done

      # ─────────────────────────────────────────────────────────────────────
      # STEP A — Deploy schema + lambdas WITHOUT the 4 new resolvers.
      # ─────────────────────────────────────────────────────────────────────
      - name: Step A - Deploy AppSync stack (schema + lambdas + resolvers)
        working-directory: aws-infrastructure
        run: npx cdk deploy VebgenixAppSync-dev -c env=dev --require-approval never --exclusively

      # ─────────────────────────────────────────────────────────────────────
      # STEP B — Force-push schema, wait for SUCCESS, verify via
      # introspection JSON parsed with python3 (no heredoc needed).
      # ─────────────────────────────────────────────────────────────────────
      - name: Step B - Force apply schema and verify fields via introspection
        run: |
          set -euo pipefail
          API_ID="${APPSYNC_API_ID}"

          echo "Schema file being applied:"
          sha256sum aws-infrastructure/lib/schema/schema.graphql
          wc -l aws-infrastructure/lib/schema/schema.graphql

          echo "Force-applying schema to API: $API_ID"
          aws appsync start-schema-creation \
            --api-id "$API_ID" \
            --definition fileb://aws-infrastructure/lib/schema/schema.graphql

          STATUS=""
          for i in $(seq 1 60); do
            STATUS=$(aws appsync get-schema-creation-status \
              --api-id "$API_ID" --query "status" --output text)
            echo "  [$i/60] $STATUS"
            [ "$STATUS" = "SUCCESS" ] && break
            if [ "$STATUS" = "FAILED" ]; then
              aws appsync get-schema-creation-status --api-id "$API_ID"
              exit 1
            fi
            sleep 5
          done

          [ "$STATUS" = "SUCCESS" ] || { echo "Schema timed out"; exit 1; }
          echo "Schema SUCCESS. Waiting 15s for AppSync propagation..."
          sleep 15

          echo "Downloading introspection schema (JSON)..."
          aws appsync get-introspection-schema \
            --api-id "$API_ID" \
            --format JSON \
            /tmp/introspection.json

          echo "Checking Query fields via python3..."
          python3 -c "import json,sys; d=json.load(open('/tmp/introspection.json')); qt=next((t for t in d['data']['__schema']['types'] if t['name']=='Query'),None); fields={f['name'] for f in (qt.get('fields') or [])}; print('Query fields:',sorted(fields)); req=['dashboardOverview','superAdminOverview','listPlatformAuditLogs','getPlatformAuditLog']; missing=[f for f in req if f not in fields]; [print('OK',f) for f in req if f in fields]; [print('MISSING',f) for f in missing]; sys.exit(1 if missing else 0)"

      # Step C is now merged into Step A — single deploy handles everything

      # ─────────────────────────────────────────────────────────────────────
      # Deploy the dev REST path only.
      #
      # Intentionally skip VebgenixNetwork-dev because the dev account still
      # has a legacy VebgenixDatabase-dev stack importing old network exports.
      # Also skip Async/Frontend/Monitoring/OIDC here; those stacks are already
      # provisioned and make routine backend dev deploys unnecessarily slow.
      # For the current dev workflow we only need the EC2 DB + REST API path.
      # ─────────────────────────────────────────────────────────────────────
      - name: Clear stale create-failed EC2 stacks
        run: |
          set -euo pipefail
          for STACK in VebgenixEc2Database-dev VebgenixRestApi-dev; do
            STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK" \
              --query "Stacks[0].StackStatus" \
              --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
              echo "Deleting stale stack $STACK in ROLLBACK_COMPLETE..."
              aws cloudformation delete-stack --stack-name "$STACK"
              aws cloudformation wait stack-delete-complete --stack-name "$STACK"
            fi
          done

      - name: Replace broken dev EC2 stacks before deploy
        run: |
          set -euo pipefail
          TARGET_DB_SUBNET="subnet-0981f0e5c706bd982"
          DELETE_STACKS=false

          DB_INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixEc2Database-dev \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue | [0]" \
            --output text 2>/dev/null || echo "None")

          if [ -n "$DB_INSTANCE_ID" ] && [ "$DB_INSTANCE_ID" != "None" ]; then
            DB_SUBNET=$(aws ec2 describe-instances \
              --instance-ids "$DB_INSTANCE_ID" \
              --query "Reservations[0].Instances[0].SubnetId" \
              --output text 2>/dev/null || echo "None")
            DB_MANAGED=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$DB_INSTANCE_ID" \
              --query "InstanceInformationList[0].InstanceId" \
              --output text 2>/dev/null || echo "None")

            echo "Existing DB instance: $DB_INSTANCE_ID"
            echo "Existing DB subnet: $DB_SUBNET"
            echo "Existing DB SSM registration: $DB_MANAGED"

            if [ "$DB_SUBNET" != "$TARGET_DB_SUBNET" ] || [ "$DB_MANAGED" != "$DB_INSTANCE_ID" ]; then
              DELETE_STACKS=true
            fi
          fi

          if [ "$DELETE_STACKS" = true ]; then
            for STACK in VebgenixRestApi-dev VebgenixEc2Database-dev; do
              STATUS=$(aws cloudformation describe-stacks \
                --stack-name "$STACK" \
                --query "Stacks[0].StackStatus" \
                --output text 2>/dev/null || echo "DOES_NOT_EXIST")
              if [ "$STATUS" != "DOES_NOT_EXIST" ]; then
                echo "Deleting broken stack $STACK before redeploy..."
                aws cloudformation delete-stack --stack-name "$STACK"
                aws cloudformation wait stack-delete-complete --stack-name "$STACK"
              fi
            done
          fi

      - name: Deploy Dev REST Stacks
        working-directory: aws-infrastructure
        run: |
          npx cdk deploy \
            VebgenixEc2Database-dev \
            VebgenixRestApi-dev \
            -c env=dev -c enableNewResolvers=true --require-approval never --exclusively

      - name: Package backend artifact
        run: |
          set -euo pipefail
          ARTIFACT_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name VebgenixStorage-dev \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue | [0]" \
            --output text)
          ARTIFACT_KEY="rest-deployments/backend-${GITHUB_SHA}.tgz"

          tar \
            --exclude='.git' \
            --exclude='server/node_modules' \
            --exclude='aws-infrastructure/node_modules' \
            --exclude='aws-infrastructure/cdk.out' \
            -czf /tmp/backend-rest.tgz .

          aws s3 cp /tmp/backend-rest.tgz "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
          echo "REST_ARTIFACT_KEY=$ARTIFACT_KEY" >> "$GITHUB_ENV"

      - name: Bootstrap DB on EC2 via SSM
        run: |
          set -euo pipefail
          DB_INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixEc2Database-dev \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue | [0]" \
            --output text)

          aws ec2 wait instance-status-ok --instance-ids "$DB_INSTANCE_ID"

          for i in $(seq 1 60); do
            MANAGED=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$DB_INSTANCE_ID" \
              --query "InstanceInformationList[0].InstanceId" \
              --output text 2>/dev/null || echo "None")
            if [ "$MANAGED" = "$DB_INSTANCE_ID" ]; then
              break
            fi
            echo "Waiting for DB host SSM registration [$i/60]..."
            sleep 10
          done

          export REST_ARTIFACT_KEY
          export STAGE=dev
          COMMAND_PARAMS=$(python3 - <<'PY'
          import json
          import os

          stage = os.environ["STAGE"]
          artifact_key = os.environ["REST_ARTIFACT_KEY"]
          commands = [
              "set -euxo pipefail",
              f"ARTIFACT_KEY='{artifact_key}'",
              "BOOTSTRAP_DIR=/opt/vebgenix/db-bootstrap",
              f"STAGE={stage}",
              "REGION=ap-south-1",
              "DOC_BUCKET=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DOCUMENTS_BUCKET\" --region \"$REGION\" --query Parameter.Value --output text)",
              "rm -rf \"$BOOTSTRAP_DIR\"",
              "mkdir -p \"$BOOTSTRAP_DIR\"",
              "aws s3 cp \"s3://$DOC_BUCKET/$ARTIFACT_KEY\" /tmp/vebgenix-backend-db.tgz --region \"$REGION\"",
              "tar -xzf /tmp/vebgenix-backend-db.tgz -C \"$BOOTSTRAP_DIR\"",
              "bash \"$BOOTSTRAP_DIR/scripts/bootstrap-ec2-postgres.sh\" \"$STAGE\" \"$REGION\"",
          ]
          print(json.dumps({"commands": commands}))
          PY
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$DB_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMAND_PARAMS" \
            --query "Command.CommandId" \
            --output text)

          sleep 5
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$DB_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "DB bootstrap status [$i/60]: $STATUS"
            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$DB_INSTANCE_ID"
                exit 1
                ;;
            esac
            sleep 10
          done

      - name: Deploy REST app to EC2 via SSM
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixRestApi-dev \
            --query "Stacks[0].Outputs[?OutputKey=='InstanceId'].OutputValue | [0]" \
            --output text)

          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"

          for i in $(seq 1 30); do
            MANAGED=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].InstanceId" \
              --output text 2>/dev/null || echo "None")
            if [ "$MANAGED" = "$INSTANCE_ID" ]; then
              break
            fi
            echo "Waiting for SSM registration [$i/30]..."
            sleep 10
          done

          ARTIFACT_KEY="${REST_ARTIFACT_KEY}"
          export ARTIFACT_KEY
          COMMAND_PARAMS=$(python3 - <<'PY'
          import json
          import os

          artifact_key = os.environ["ARTIFACT_KEY"]
          commands = [
              "set -euxo pipefail",
              f"ARTIFACT_KEY='{artifact_key}'",
              "APP_DIR=/opt/vebgenix/app",
              "STAGE=dev",
              "REGION=ap-south-1",
              "rm -rf \"$APP_DIR\"",
              "mkdir -p \"$APP_DIR\"",
              "DOC_BUCKET=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DOCUMENTS_BUCKET\" --region \"$REGION\" --query Parameter.Value --output text)",
              "aws s3 cp \"s3://$DOC_BUCKET/$ARTIFACT_KEY\" /tmp/vebgenix-backend.tgz --region \"$REGION\"",
              "tar -xzf /tmp/vebgenix-backend.tgz -C \"$APP_DIR\"",
              "USER_POOL_ID=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/USER_POOL_ID\" --region \"$REGION\" --query Parameter.Value --output text)",
              "USER_POOL_CLIENT_ID=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/USER_POOL_CLIENT_ID\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_HOST=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DB_HOST\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_NAME=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DB_NAME\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_SECRET_ARN=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/DB_SECRET_ARN\" --region \"$REGION\" --query Parameter.Value --output text)",
              "EVENT_BUS_NAME=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/rest/EVENT_BUS_NAME\" --region \"$REGION\" --query Parameter.Value --output text)",
              "FRONTEND_URL=$(aws ssm get-parameter --name \"/vebgenix/$STAGE/frontend/APP_URL\" --region \"$REGION\" --query Parameter.Value --output text)",
              "DB_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id \"$DB_SECRET_ARN\" --region \"$REGION\" --query SecretString --output text)",
              "DB_USER=$(echo \"$DB_SECRET_JSON\" | jq -r '.username')",
              "DB_PASS=$(echo \"$DB_SECRET_JSON\" | jq -r '.password')",
              "export DB_USER DB_PASS",
              "DB_USER_ENCODED=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ[\"DB_USER\"], safe=\"\"))')",
              "DB_PASS_ENCODED=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ[\"DB_PASS\"], safe=\"\"))')",
              "cat >/etc/vebgenix-rest.env <<ENV\nPORT=5000\nNODE_ENV=production\nAWS_REGION=$REGION\nAWS_DEFAULT_REGION=$REGION\nUSER_POOL_ID=$USER_POOL_ID\nUSER_POOL_CLIENT_ID=$USER_POOL_CLIENT_ID\nCOGNITO_USER_POOL_ID=$USER_POOL_ID\nCOGNITO_CLIENT_ID=$USER_POOL_CLIENT_ID\nDB_NAME=$DB_NAME\nDATABASE_URL=postgresql://$DB_USER_ENCODED:$DB_PASS_ENCODED@$DB_HOST:5432/$DB_NAME\nDIRECT_URL=postgresql://$DB_USER_ENCODED:$DB_PASS_ENCODED@$DB_HOST:5432/$DB_NAME\nDOCUMENTS_BUCKET=$DOC_BUCKET\nS3_BUCKET_NAME=$DOC_BUCKET\nUPLOADS_BUCKET_NAME=$DOC_BUCKET\nMEDIA_BUCKET_NAME=$DOC_BUCKET\nS3_PUBLIC_BASE_URL=https://$DOC_BUCKET.s3.$REGION.amazonaws.com\nS3_UPLOAD_ROOT=tenants\nS3_CAMPUS_SEGMENT=campuses\nS3_USER_SEGMENT=users\nS3_TENANT_CAMPUS_FALLBACK=tenant\nS3_PROFILE_SCOPE_NAME=profile\nS3_BRANDING_SCOPE_NAME=branding\nS3_ADMISSION_SCOPE_NAME=admissions\nS3_APPLICATION_SCOPE_NAME=applications\nS3_ENQUIRY_SCOPE_NAME=enquiries\nS3_DOCUMENT_SCOPE_NAME=documents\nS3_RESULTS_SCOPE_NAME=results\nS3_PUBLISHED_RESULTS_SCOPE_NAME=published\nS3_AVATAR_UPLOAD_NAME=avatar\nS3_LOGO_UPLOAD_NAME=logo\nEVENT_BUS_NAME=$EVENT_BUS_NAME\nFRONTEND_URL=$FRONTEND_URL\nHTTP_ACCESS_LOGS=false\nPRISMA_DEBUG_QUERIES=false\nENV",
              "cd \"$APP_DIR/server\"",
              "if ! node -v | grep -q '^v20\\.'; then dnf install -y xz && curl -fsSL https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-arm64.tar.xz -o /tmp/node.tar.xz && mkdir -p /usr/local/lib/nodejs && tar -xJf /tmp/node.tar.xz -C /usr/local/lib/nodejs && ln -sf /usr/local/lib/nodejs/node-v20.19.0-linux-arm64/bin/node /usr/local/bin/node && ln -sf /usr/local/lib/nodejs/node-v20.19.0-linux-arm64/bin/npm /usr/local/bin/npm && ln -sf /usr/local/lib/nodejs/node-v20.19.0-linux-arm64/bin/npx /usr/local/bin/npx && hash -r; fi",
                "npm ci",
                "set -a && source /etc/vebgenix-rest.env && set +a",
                "npx prisma db push --accept-data-loss --schema=prisma/schema.prisma",
                "npx prisma generate --schema=prisma/schema.prisma",
                "npm run seed:permissions",
                "npm run build",
              "cat >/etc/systemd/system/vebgenix-rest.service <<'EOF'\n[Unit]\nDescription=Vebgenix REST API\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=simple\nUser=ec2-user\nWorkingDirectory=/opt/vebgenix/app/server\nEnvironmentFile=/etc/vebgenix-rest.env\nExecStart=/usr/local/bin/node /opt/vebgenix/app/server/dist/src/main.js\nRestart=always\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\nEOF",
              "systemctl daemon-reload",
              "systemctl enable vebgenix-rest",
              "systemctl restart vebgenix-rest",
              "echo '' | base64 -d > /etc/nginx/nginx.conf",
              "which nginx || dnf install -y nginx -q",
              "nginx -s quit 2>/dev/null || pkill -f nginx 2>/dev/null || true",
              "sleep 2",
              "systemctl enable nginx && systemctl restart nginx",
          ]
          print(json.dumps({"commands": commands}))
          PY
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMAND_PARAMS" \
            --query "Command.CommandId" \
            --output text)

          sleep 5
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "SSM command status [$i/60]: $STATUS"
            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"
                exit 1
                ;;
            esac
            sleep 10
          done

      - name: Update CloudFront origin to current EC2 DNS
        run: |
          set -euo pipefail
          INSTANCE_DNS=$(aws cloudformation describe-stacks \
            --stack-name VebgenixRestApi-dev \
            --query "Stacks[0].Outputs[?OutputKey=='InstancePublicDns'].OutputValue | [0]" \
            --output text)
          CF_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name VebgenixRestApi-dev \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue | [0]" \
            --output text 2>/dev/null || echo "")
          if [ -z "$CF_DIST_ID" ] || [ "$CF_DIST_ID" = "None" ]; then
            CF_DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?contains(Origins.Items[0].DomainName,'compute.amazonaws.com')].Id | [0]" \
              --output text 2>/dev/null || echo "")
          fi
          if [ -n "$CF_DIST_ID" ] && [ "$CF_DIST_ID" != "None" ]; then
            echo "Updating CloudFront $CF_DIST_ID origin to $INSTANCE_DNS"
            ETAG=$(aws cloudfront get-distribution-config --id "$CF_DIST_ID" --query "ETag" --output text)
            aws cloudfront get-distribution-config --id "$CF_DIST_ID" --query "DistributionConfig" --output json > /tmp/cf-config.json
            python3 -c "
          import json
          with open('/tmp/cf-config.json') as f:
              config = json.load(f)
          old = config['Origins']['Items'][0]['DomainName']
          config['Origins']['Items'][0]['DomainName'] = '$INSTANCE_DNS'
          config['Origins']['Items'][0]['Id'] = '$INSTANCE_DNS'
          config['DefaultCacheBehavior']['TargetOriginId'] = '$INSTANCE_DNS'
          with open('/tmp/cf-config-updated.json', 'w') as f:
              json.dump(config, f)
          print(f'Updated CF origin: {old} -> $INSTANCE_DNS')
          "
            aws cloudfront update-distribution \
              --id "$CF_DIST_ID" \
              --distribution-config file:///tmp/cf-config-updated.json \
              --if-match "$ETAG" \
              --query "Distribution.Status" --output text || true
          else
            echo "CloudFront distribution not found, skipping origin update"
          fi
          echo "INSTANCE_DNS=$INSTANCE_DNS" >> "$GITHUB_ENV"

      - name: Verify REST health
        run: |
          set -euo pipefail
          INSTANCE_DNS="${INSTANCE_DNS}"
          for i in $(seq 1 30); do
            if curl --fail --silent --show-error "http://$INSTANCE_DNS/api/health"; then
              exit 0
            fi
            echo "Waiting for REST health endpoint [$i/30]..."
            sleep 10
          done
          exit 1
